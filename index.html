    // АВТОМАТИЧЕСКИЙ МАППИНГ ID ПЛАНА -> МАССИВ ID ШАБЛОНОВ (ИСПРАВЛЕНО)

           if (!PLAN_TO_TEMPLATE[id].includes(t.id)) PLAN_TO_TEMPLATE[id].push(t.id);
        };
        const rangeMatch = p.nums.match(/№(\d+)[–-](\d+)/); // Ищем диапазон (например, №24-25)
        if (rangeMatch) {
          for (let i = parseInt(rangeMatch[1]); i <= parseInt(rangeMatch[2]); i++) {
             addId(i);
          }
        } else {
          const singleMatch = p.nums.match(/№(\d+)/); // Ищем одно число (например, №12)
          if (singleMatch) {
             addId(parseInt(singleMatch[1]));
          }
        }
      });
    });

    async function bootstrap() {

        const firebaseConfig = {

        const app = initializeApp(firebaseConfig);

        try {

        // --- 2. ИМПОРТ БАЗЫ ДАННЫХ ---
        let dbModule;
        try {
          dbModule = await import('./ege_plans_db.js');
        } catch (e) {
          throw new Error(`Файл базы данных не найден. Убедитесь, что ege_plans_db.js загружен на GitHub рядом с index.html.`);
        }
        
        const RAW_PLANS = dbModule.RAW_PLANS || dbModule.PLANS;
        if (!RAW_PLANS || !Array.isArray(RAW_PLANS)) throw new Error("Не удалось найти массив RAW_PLANS внутри файла.");

        // --- 3. ПАРСЕРЫ ---
        const parseReferencePlan = (text) => {
          if (!text) return { points: [] };
          const lines = text.split('\n').map(l => l.trim()).filter(l => l);
          const points = [];
          let currentPoint = null;

          lines.forEach(line => {
            let cleanLine = line.replace(/^>\s*/, '').replace(/\\\*/g, '*').trim();
            if (!cleanLine) return;

            const pointMatch = cleanLine.match(/^(\d+)\.?\s+(.*)/);
            const subpointMatch = cleanLine.match(/^([а-яa-zа-яё])\)\s+(.*)/i) || cleanLine.match(/^-\s+(.*)/);

            if (pointMatch && !subpointMatch) {
              currentPoint = { text: pointMatch[2].replace(/[:;.]+$/, '').trim(), subpoints: [] };
              points.push(currentPoint);
            } else if (subpointMatch && currentPoint) {
              currentPoint.subpoints.push(subpointMatch[2].replace(/[;.]+$/, '').trim());
            }
          });
          return { points };
        };

        const PLANS_DB = RAW_PLANS.map(p => ({
          id: p.id,
          topic: p.title || "Без названия",
          aliases: p.aliases || [],
          section: p.block || "Без раздела",
          difficulty: p.mandatoryPoints && p.mandatoryPoints.length >= 4 ? "hard" : p.mandatoryPoints && p.mandatoryPoints.length <= 2 ? "easy" : "medium",

        }));

        const UNIQUE_BLOCKS = ['all', ...new Set(PLANS_DB.map(p => p.section).filter(Boolean))];

        // --- 4. АЛГОРИТМЫ СРАВНЕНИЯ ---
        const STOP_WORDS = new Set(["и", "в", "во", "не", "что", "он", "на", "я", "с", "со", "как", "а", "то", "все", "она", "так", "его", "но", "да", "ты", "к", "у", "же", "вы", "за", "бы", "по", "только", "ее", "мне", "было", "вот", "от", "меня", "еще", "нет", "о", "из", "ему", "теперь", "когда", "даже", "ну", "вдруг", "ли", "если", "уже", "или", "ни", "быть", "был", "него", "до", "вас", "нибудь", "опять", "уж", "вам", "ведь", "там", "потом", "себя", "ничего", "ей", "может", "они", "тут", "где", "есть", "надо", "ней", "для", "мы", "тебя", "их", "чем", "была", "сам", "чтоб", "без", "будто", "чего", "раз", "тоже", "себе", "под", "будет", "ж", "тогда", "кто", "этот", "того", "потому", "этого", "какой", "совсем", "ним", "здесь", "этом", "один", "почти", "мой", "тем", "чтобы", "нее", "сейчас", "были", "куда", "зачем", "всех", "никогда", "можно", "при", "наконец", "два", "об", "другой", "хоть", "после", "над", "больше", "тот", "через", "эти", "нас", "про", "всего", "них", "какая", "много", "разве", "три", "эту", "моя", "впрочем", "хорошо", "свою", "этой", "перед", "иногда", "лучше", "чуть", "том", "нельзя", "такой", "им", "более", "всегда", "конечно", "всю", "между"]);

        const normalizeText = (text) => {
          if (!text) return [];
          return text.toLowerCase().replace(/[.,:;!?()\[\]"']/g, ' ').split(/\s+/).filter(word => word.length > 2 && !STOP_WORDS.has(word));
        };

        const jaccardIndex = (words1, words2) => {
          const set1 = new Set(words1);
          const set2 = new Set(words2);
          const intersection = new Set([...set1].filter(x => set2.has(x)));
          const union = new Set([...set1, ...set2]);
          if (union.size === 0) return 0;
          return intersection.size / union.size;
        };

        const parseUserText = (text) => {
          const lines = text.split('\n').filter(l => l.trim() !== '');
          const parsed = [];
          let currentPoint = null;

          lines.forEach(line => {
            if (line.startsWith(' ') || line.startsWith('\t') || line.trim().startsWith('-') || /^[а-яa-z]\)/.test(line.trim())) {
              if (currentPoint) {
                currentPoint.subpoints.push(line.trim().replace(/^-/, '').trim());
              } else {
                currentPoint = { text: "Без заголовка", subpoints: [line.trim()] };
                parsed.push(currentPoint);
              }
            } else {
              currentPoint = { text: line.trim(), subpoints: [] };
              parsed.push(currentPoint);
            }
          });
          return parsed;
        };

        const comparePlans = (userPlanText, referencePlan, ignoreSubpoints = false, isBlitz = false) => {
          const userParsed = parseUserText(userPlanText);
          const THRESHOLD = 0.35;
          
          let scorePoints = 0;
          let scoreSubpoints = 0;
          const totalRefPoints = referencePlan.points.length;
          let totalRefSubpoints = 0;
          
          const matchResults = referencePlan.points.map(refPoint => {
            if (!ignoreSubpoints) totalRefSubpoints += refPoint.subpoints.length;
            const refWords = normalizeText(refPoint.text);
            let bestMatch = null;
            let bestScore = 0;
            let bestSubpointsMatchCount = 0;
            let bestSubpointMatches = refPoint.subpoints.map(sp => ({ text: sp, matched: false }));
            
            userParsed.forEach(userPoint => {
              const userWords = normalizeText(userPoint.text);
              const score = jaccardIndex(refWords, userWords);
              
              let currentSubpointMatches = [];
              let currentSubpointMatchCount = 0;
              
              refPoint.subpoints.forEach(refSub => {
                const refSubWords = normalizeText(refSub);
                let isSubMatched = false;
                if (!ignoreSubpoints) {
                  userPoint.subpoints.forEach(userSub => {
                    if (jaccardIndex(refSubWords, normalizeText(userSub)) >= THRESHOLD) isSubMatched = true;
                  });
                }
                currentSubpointMatches.push({ text: refSub, matched: isSubMatched });
                if (isSubMatched) currentSubpointMatchCount++;
              });

              if (currentSubpointMatchCount > bestSubpointsMatchCount || 
                 (currentSubpointMatchCount === bestSubpointsMatchCount && score > bestScore)) {
                bestScore = score;
                bestMatch = userPoint;
                bestSubpointsMatchCount = currentSubpointMatchCount;
                bestSubpointMatches = currentSubpointMatches;
              }
            });

            let isPointMatched = bestScore >= THRESHOLD;
            
            // Если совпало 3 подпункта (или все, если их меньше), засчитываем весь пункт
            if (!ignoreSubpoints && (bestSubpointsMatchCount >= 3 || (refPoint.subpoints.length > 0 && bestSubpointsMatchCount === refPoint.subpoints.length))) {
              isPointMatched = true;
            }

            if (isPointMatched) {
              scorePoints++;
              if (!ignoreSubpoints) scoreSubpoints += bestSubpointsMatchCount;
            } else {
              if (!ignoreSubpoints) bestSubpointMatches = bestSubpointMatches.map(sp => ({...sp, matched: false}));
            }

            return {
              text: refPoint.text,
              matched: isPointMatched,
              subpoints: bestSubpointMatches,
              userTextMatched: isPointMatched ? bestMatch?.text : null
            };
          });

          const pointWeight = ignoreSubpoints ? 100 : 50;
          const subpointWeight = ignoreSubpoints ? 0 : 50;
          
          const pointsScore = totalRefPoints > 0 ? (scorePoints / totalRefPoints) * pointWeight : 0;
          const subpointsScore = totalRefSubpoints > 0 && !ignoreSubpoints ? (scoreSubpoints / totalRefSubpoints) * subpointWeight : subpointWeight;
          
          return { results: matchResults, score: Math.round(pointsScore + subpointsScore), ignoreSubpoints, isBlitz };
        };

        const getTodayStr = () => new Date().toISOString().split('T')[0];
        
        const calculateNextReview = (attempts, score, lastDate) => {
          const baseDate = new Date(lastDate);
          let addDays = 0;
          if (score >= 90) {
            if (attempts === 1) addDays = 1;
            else if (attempts === 2) addDays = 3;
            else if (attempts === 3) addDays = 7;
            else if (attempts === 4) addDays = 14;
            else addDays = 30;
          } else {
            if (attempts <= 2) addDays = 1;
            else if (attempts === 3) addDays = 3;
            else addDays = 7;
          }
          baseDate.setDate(baseDate.getDate() + addDays);
          return baseDate.toISOString().split('T')[0];
        };

        function formatTime(seconds) {
            if (!seconds || seconds <= 0) return '0 мин';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            if (h > 0 && m > 0) return `${h} ч ${m} мин`;
            if (h > 0) return `${h} ч`;
            if (m > 0) return `${m} мин`;
            return `< 1 мин`;
        }

        // --- 5. ГЛОБАЛЬНОЕ СОСТОЯНИЕ ---
        const state = {
          view: 'dashboard',
          isAuthReady: false,
          authMode: 'login',
          searchQuery: '',
          selectedBlock: 'all',
          selectedTemplate: 'all',
          selectedPlanId: null,
          userDraft: '',
          comparisonResult: null,
          modeSelectorId: null,
          expandedTemplate: null,
          expandedDay: null,
          viewTemplateModal: null,
          imageModalData: null,
          blanksData: [],
          timeLeft: 60,
          timerRef: null,
          playlist: [], 
          playlistIndex: 0, 
          currentTrainingMode: 'classic',
          progress: JSON.parse(localStorage.getItem('ege_plan_progress') || '{}'),
          streak: JSON.parse(localStorage.getItem('ege_plan_streak') || '{"count": 0, "lastActive": null}'),
          timeStats: JSON.parse(localStorage.getItem('ege_plan_time_stats') || '{}')
        };

        // --- 6. РАБОТА С FIREBASE И КЭШЕМ ---
        async function loadUserData() {
          if (!currentUser) return;
          try {
            const docRef = doc(db, 'users', currentUser.uid);
            const snap = await getDoc(docRef);
            if (snap.exists()) {
              const data = snap.data();
              
              const cloudProgress = data.progress || {};
              const localProgress = state.progress || {};
              const mergedProgress = { ...cloudProgress };
              for (const key in localProgress) {
                 if (!mergedProgress[key] || localProgress[key].bestScore >= mergedProgress[key].bestScore) {
                    mergedProgress[key] = localProgress[key];
                 }
              }
              state.progress = mergedProgress;
              localStorage.setItem('ege_plan_progress', JSON.stringify(state.progress));

              const cloudStreak = data.streak || { count: 0, lastActive: null };
              const localStreak = state.streak || { count: 0, lastActive: null };
              state.streak = localStreak.count > cloudStreak.count ? localStreak : cloudStreak;
              localStorage.setItem('ege_plan_streak', JSON.stringify(state.streak));

              const cloudTime = data.timeStats || {};
              const localTime = state.timeStats || {};
              const mergedTime = { ...cloudTime };
              for (const key in localTime) {
                  mergedTime[key] = Math.max(localTime[key] || 0, mergedTime[key] || 0);
              }
              state.timeStats = mergedTime;
              localStorage.setItem('ege_plan_time_stats', JSON.stringify(state.timeStats));

              saveProgressToCloud();
            } else {
              saveProgressToCloud();
            }
          } catch(e) { console.error("Ошибка загрузки данных из облака:", e); }
        }

        function saveProgressToCloud() {
          if (!currentUser) return;
          try {
            const docRef = doc(db, 'users', currentUser.uid);
            setDoc(docRef, {
              progress: state.progress,
              streak: state.streak,
              timeStats: state.timeStats
            }, { merge: true }).catch(err => console.error(err));
          } catch (e) { console.error(e); }
        }

        const saveProgressLocallyAndCloud = (score) => {
          const today = getTodayStr();
          const prevData = state.progress[state.selectedPlanId] || { attempts: 0, bestScore: 0 };
          const newAttempts = prevData.attempts + 1;
          
          state.progress[state.selectedPlanId] = {
            attempts: newAttempts,
            lastAttempt: today,
            bestScore: Math.max(prevData.bestScore, score),
            lastScore: score,
            nextReview: calculateNextReview(newAttempts, score, today),
            status: score >= 90 && newAttempts >= 3 ? 'mastered' : score >= 70 ? 'almost' : 'learning'
          };
          
          localStorage.setItem('ege_plan_progress', JSON.stringify(state.progress));
          updateStreak();
        };

        const updateStreak = () => {
          const today = getTodayStr();
          if (state.streak.lastActive !== today) {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toISOString().split('T')[0];
            
            if (state.streak.lastActive === yesterdayStr) state.streak.count++;
            else state.streak.count = 1;
            
            state.streak.lastActive = today;
            localStorage.setItem('ege_plan_streak', JSON.stringify(state.streak));
          }
          saveProgressToCloud();
        };

        // --- 7. ДЕЙСТВИЯ (ACTIONS) ---
        window.actions = {
          toggleAuthMode: () => {
            state.authMode = state.authMode === 'login' ? 'register' : 'login';

          startTraining: (id, mode = 'classic') => {
            state.selectedPlanId = id;
            state.modeSelectorId = null;
            state.comparisonResult = null;
            state.currentTrainingMode = mode;
            clearInterval(state.timerRef);

            if (state.playlist.length > 0 && id !== state.playlist[state.playlistIndex]) {
               state.playlist = [];
            }

            if (mode === 'study') {
              state.view = 'study';
            } else if (mode === 'classic') {
              state.userDraft = '';
              state.view = 'training';
            } else if (mode === 'blanks') {
              const planData = PLANS_DB.find(p => p.id === id);
              const items = [];
              planData.plan.points.forEach((p, pIdx) => {
                let pointHidden = Math.random() > 0.6;
                let subpointsHidden = p.subpoints.map(() => Math.random() > 0.4);
                let allHidden = pointHidden && subpointsHidden.every(sh => sh === true);
                if (allHidden) {
                  const totalItems = 1 + p.subpoints.length;
                  const forceVisibleIdx = Math.floor(Math.random() * totalItems);
                  if (forceVisibleIdx === 0) pointHidden = false; 
                  else subpointsHidden[forceVisibleIdx - 1] = false; 
                }

                items.push({ id: `p_${pIdx}`, type: 'point', text: p.text, hidden: pointHidden, userInput: '' });
                p.subpoints.forEach((sp, spIdx) => {
                  items.push({ id: `s_${pIdx}_${spIdx}`, type: 'subpoint', text: sp, hidden: subpointsHidden[spIdx], userInput: '' });
                });
              });
              state.blanksData = items;
              state.view = 'training_blanks';
            }
            window.scrollTo(0,0);
            render();
          },

          startBlitz: () => {
            let pool = PLANS_DB;
            if (state.selectedBlock !== 'all') {
              pool = pool.filter(p => p.section === state.selectedBlock);
            }
            if (pool.length === 0) pool = PLANS_DB;

            const randomPlan = pool[Math.floor(Math.random() * pool.length)];
            state.selectedPlanId = randomPlan.id;
            state.userDraft = '';
            state.comparisonResult = null;
            state.timeLeft = 60;
            state.view = 'blitz';
            window.scrollTo(0,0);
            render();

            clearInterval(state.timerRef);
            state.timerRef = setInterval(() => {
              if (state.view !== 'blitz') {
                 clearInterval(state.timerRef);
                 return;
              }
              
              if (state.timeLeft > 0) {
                state.timeLeft--;
                const timerEl = document.getElementById('blitz-timer');
                if (timerEl) {
                  timerEl.innerText = `00:${state.timeLeft.toString().padStart(2, '0')}`;
                  if (state.timeLeft <= 10) {
                    timerEl.classList.add('text-[#E74C3C]', 'border-[#E74C3C]', 'animate-pulse');
                    timerEl.classList.remove('text-[#4A90D9]', 'border-[#E8E4DF]');
                  }
                }
              } else {
                clearInterval(state.timerRef);
                window.actions.finishTraining(true);
              }
            }, 1000);
          },

          finishTraining: (isBlitz = false) => {
            clearInterval(state.timerRef);
            const plan = PLANS_DB.find(p => p.id === state.selectedPlanId);
            const result = comparePlans(state.userDraft, plan.plan, isBlitz, isBlitz);
            state.comparisonResult = result;
            saveProgressLocallyAndCloud(result.score);
            state.view = 'comparison';
            window.scrollTo(0,0);
            render();
          },

          finishBlanks: () => {
            const plan = PLANS_DB.find(p => p.id === state.selectedPlanId);
            let correctCount = 0;
            let totalHidden = 0;
            let draftLines = [];
            
            const newResults = plan.plan.points.map((p, pIdx) => {
              const pointData = state.blanksData.find(item => item.id === `p_${pIdx}`);
              let isPointMatched = true;

              if (pointData && pointData.hidden) {
                totalHidden++;
                const score = jaccardIndex(normalizeText(pointData.text), normalizeText(pointData.userInput));
                isPointMatched = score >= 0.35;
                if (isPointMatched) correctCount++;
                draftLines.push(`${pIdx + 1}. ${pointData.userInput || '[пропуск]'}`);
              } else if (pointData) {
                draftLines.push(`${pIdx + 1}. ${pointData.text}`);
              }

              const subpointMatches = p.subpoints.map((sp, spIdx) => {
                const spData = state.blanksData.find(item => item.id === `s_${pIdx}_${spIdx}`);
                let isSpMatched = true;
                if (spData && spData.hidden) {
                  totalHidden++;
                  const score = jaccardIndex(normalizeText(spData.text), normalizeText(spData.userInput));
                  isSpMatched = score >= 0.35;
                  if (isSpMatched) correctCount++;
                  draftLines.push(`   - ${spData.userInput || '[пропуск]'}`);
                } else if (spData) {
                  draftLines.push(`   - ${spData.text}`);
                }
                return { text: sp, matched: isSpMatched };
              });

              return { text: p.text, matched: isPointMatched, subpoints: subpointMatches };
            });
            
            state.userDraft = draftLines.join('\n');
            const finalScore = totalHidden > 0 ? Math.round((correctCount / totalHidden) * 100) : 100;
            
            state.comparisonResult = { score: finalScore, results: newResults, ignoreSubpoints: false, isBlitz: false };
            saveProgressLocallyAndCloud(finalScore);
            state.view = 'comparison';
            window.scrollTo(0,0);
            render();
          },

          toggleMatch: (pointIdx, subIdx = null) => {
            if (state.comparisonResult.ignoreSubpoints && subIdx !== null) return;

            const newResults = JSON.parse(JSON.stringify(state.comparisonResult.results));
            
            if (subIdx === null) newResults[pointIdx].matched = !newResults[pointIdx].matched;
            else newResults[pointIdx].subpoints[subIdx].matched = !newResults[pointIdx].subpoints[subIdx].matched;

            let scorePoints = 0, scoreSubpoints = 0, totalRefSubpoints = 0;
            const totalRefPoints = newResults.length;

            newResults.forEach(r => {
              if (r.matched) scorePoints++;
              if (!state.comparisonResult.ignoreSubpoints) {
                 totalRefSubpoints += r.subpoints.length;
                 r.subpoints.forEach(s => { if (s.matched) scoreSubpoints++; });
              }
            });

            const pointWeight = state.comparisonResult.ignoreSubpoints ? 100 : 50;
            const subpointWeight = state.comparisonResult.ignoreSubpoints ? 0 : 50;
            const pointsScore = totalRefPoints > 0 ? (scorePoints / totalRefPoints) * pointWeight : 0;
            const subpointsScore = totalRefSubpoints > 0 && !state.comparisonResult.ignoreSubpoints ? (scoreSubpoints / totalRefSubpoints) * subpointWeight : subpointWeight;
            const newTotalScore = Math.round(pointsScore + subpointsScore);

            state.comparisonResult.results = newResults;
            state.comparisonResult.score = newTotalScore;
            saveProgressLocallyAndCloud(newTotalScore);
            render();
          },

          closeModal: () => { state.modeSelectorId = null; render(); },
          
          copyScreenshot: async () => {
            const btn = document.getElementById('screenshot-btn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="ph ph-spinner-gap animate-spin text-lg"></i> Обработка...';
            btn.disabled = true;

            const resetBtn = () => {
              btn.innerHTML = originalHTML;
              btn.disabled = false;
              btn.className = "flex-1 sm:flex-none flex items-center justify-center gap-1.5 text-[#4A90D9] bg-[#4A90D9]/10 hover:bg-[#4A90D9]/20 font-bold px-3 py-2.5 md:py-2 rounded-xl md:rounded-lg transition-all text-sm md:text-base border border-transparent";
            };

            const finishSuccess = (text) => {
              btn.innerHTML = `<i class="ph-fill ph-check-circle text-lg text-white"></i> ${text}`;
              btn.classList.remove('bg-[#4A90D9]/10', 'text-[#4A90D9]', 'hover:bg-[#4A90D9]/20');
              btn.classList.add('bg-[#5CB85C]', 'text-white', 'border-transparent');
              setTimeout(resetBtn, 3000);
            };

            try {
              const target = document.getElementById('screenshot-target');
              const clone = target.cloneNode(true);
              clone.style.position = 'absolute';
              clone.style.left = '-9999px';
              clone.style.top = '0';
              clone.style.width = target.offsetWidth + 'px'; 
              clone.style.height = 'auto'; 
              
              document.body.appendChild(clone);

              const canvas = await html2canvas(clone, { 
                scale: window.devicePixelRatio > 1 ? 2 : 1, // Оптимизация для мобильных
                backgroundColor: '#FAF7F2', 
                useCORS: true
              });
              
              document.body.removeChild(clone);
              
              const dataUrl = canvas.toDataURL('image/png');

              canvas.toBlob(async (blob) => {
                const file = new File([blob], 'plan_result.png', { type: 'image/png' });
                const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                
                // 1. Попытка вызова системного окна Поделиться (Web Share API)
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                  try {
                    await navigator.share({
                      files: [file],
                      title: 'Результат проверки плана'
                    });
                    finishSuccess('Отправлено!');
                    return; // Успешно поделились, выходим
                  } catch (shareErr) {
                    console.warn("Share API отменен или недоступен", shareErr);
                  }
                }

                // 2. Фолбэк для телефонов
                if (isMobile) {
                   actions.showImageModal(dataUrl);
                   finishSuccess('Готово!');
                   return;
                }

                // 3. Для ПК - копируем в буфер
                try {
                  const item = new ClipboardItem({ 'image/png': blob });
                  await navigator.clipboard.write([item]);
                  finishSuccess('Скопировано!');
                } catch (clipboardErr) {
                  console.warn('Clipboard недоступен, скачиваем картинку...', clipboardErr);
                  const url = URL.createObjectURL(blob);
                  const a = document.createElement('a');
                  a.href = url;
                  a.download = 'plan_result.png';
                  a.click();
                  URL.revokeObjectURL(url);
                  finishSuccess('Сохранено!');
                }
              }, 'image/png');
            } catch (err) {
              console.error(err);
              btn.innerHTML = '<i class="ph ph-warning-circle text-lg"></i> Ошибка';
              setTimeout(resetBtn, 3000);
            }
          }
        };

        window.generateCatalogGrid = function() {
          const query = state.searchQuery.toLowerCase();
          const filtered = PLANS_DB.filter(plan => {
            if (state.selectedBlock !== 'all' && plan.section !== state.selectedBlock) return false;
            // ИСПРАВЛЕНИЕ ДЛЯ ФИЛЬТРА: Теперь проверяем вхождение в массив
            if (state.selectedTemplate !== 'all' && (!PLAN_TO_TEMPLATE[plan.id] || !PLAN_TO_TEMPLATE[plan.id].includes(state.selectedTemplate))) return false;
            if (!query) return true;
            return plan.topic.toLowerCase().includes(query) || plan.aliases.some(a => a.toLowerCase().includes(query));
          });

          if (filtered.length === 0) {
             return `<div class="col-span-full text-center py-10 text-[#7A7570]">По вашему запросу ничего не найдено.</div>`;
          }

          return filtered.map(plan => {
            const p = state.progress[plan.id];
            let statusColor = 'bg-gray-200 text-[#7A7570]';
            let statusText = 'Новый';
            if (p) {
              if (p.status === 'mastered') { statusColor = 'bg-[#D4A017] text-white'; statusText = 'Выучен ⭐'; }
              else if (p.status === 'almost') { statusColor = 'bg-[#5CB85C] text-white'; statusText = 'Почти выучен'; }
              else { statusColor = 'bg-[#F5A623] text-white'; statusText = 'В процессе'; }

                    ${!isBlitz ? `<button onclick="actions.useHint()" class="text-[#7A7570] hover:text-[#2D2A26] font-medium text-xs md:text-sm px-4 py-2.5 w-full sm:w-auto text-center border border-[#E8E4DF] sm:border-transparent rounded-xl sm:rounded-none bg-white sm:bg-transparent shadow-sm sm:shadow-none">Нужна подсказка</button>` : '<div class="hidden sm:block"></div>'}
                    <button id="check-btn" onclick="actions.finishTraining(${isBlitz})" ${(!isBlitz && state.userDraft.trim().length < 10) ? 'disabled' : ''} class="w-full sm:w-auto ${isBlitz ? 'bg-[#2D2A26] hover:bg-black' : 'bg-[#4A90D9] hover:bg-[#3A7BC0] disabled:bg-gray-300 disabled:cursor-not-allowed'} text-white font-bold py-3 md:py-2.5 px-8 rounded-xl transition-colors shadow-sm flex items-center justify-center gap-2 text-sm md:text-base">
                      <i class="ph-fill ph-check-circle text-lg md:text-xl"></i> ${isBlitz ? 'Завершить досрочно' : 'Проверить план'}
                    </button>
                  </div>
                </div>
              </div>
            `;
          }

          if (state.view === 'training_blanks') {
            const plan = PLANS_DB.find(p => p.id === state.selectedPlanId);
            const blanksHTML = state.blanksData.map((item, idx) => `
              <div class="flex items-start gap-2 md:gap-3 ${item.type === 'subpoint' ? 'pl-6 md:pl-8' : ''}">
                <span class="text-[#4A90D9] font-bold mt-2 select-none shrink-0">${item.type === 'point' ? '•' : '◦'}</span>
                ${item.hidden 
                  ? `<input type="text" oninput="actions.updateBlank(${idx}, event.target.value)" value="${item.userInput}" placeholder="..." class="flex-grow bg-[#FAF7F2] border-b-2 border-dashed border-[#F5A623] text-[#2D2A26] px-2 py-1.5 md:px-3 md:py-2 focus:outline-none focus:bg-[#FFF0E5] focus:border-solid transition-colors font-medium text-[15px] md:text-lg w-full">` 
                  : `<div class="px-2 py-1.5 md:px-3 md:py-2 text-[#2D2A26] font-medium text-[15px] md:text-lg bg-gray-50 rounded-lg flex-grow border border-transparent shadow-sm">${item.text}</div>`
                }

            return `
              <div class="flex-grow flex flex-col w-full max-w-[1200px] mx-auto px-4 md:px-6 pt-4 md:pt-6 pb-8">
                <button onclick="actions.setView('catalog')" class="shrink-0 flex items-center gap-2 text-[#7A7570] hover:text-[#2D2A26] mb-4 font-medium transition-colors text-sm md:text-base self-start bg-white border border-[#E8E4DF] px-4 py-2 rounded-lg shadow-sm">

                </div>

            `;
          }

          if (state.view === 'statistics') {
            const sectionsHTML = ['Человек в обществе. Духовная культура', 'Экономическая жизнь общества', 'Социальная сфера', 'Политическая сфера', 'Правовое регулирование'].map(section => {
              const sectionPlans = PLANS_DB.filter(p => p.section === section);
              if (sectionPlans.length === 0) return '';
              const learned = sectionPlans.filter(p => state.progress[p.id]?.status === 'mastered' || state.progress[p.id]?.status === 'almost').length;
              const percent = Math.round((learned / sectionPlans.length) * 100);
              return `
                <div class="mb-4">
                  <div class="flex justify-between text-xs md:text-sm font-bold mb-1">
                    <span class="text-[#7A7570] truncate pr-2">${section.split('.')[0]}</span>

                  <div class="w-full bg-[#FAF7F2] rounded-full h-2 md:h-3 overflow-hidden border border-[#E8E4DF]">
                    <div class="bg-[#4A90D9] h-2 md:h-3 rounded-full transition-all duration-1000" style="width: ${percent}%"></div>
                  </div>
                </div>`;
            }).join('');

            const progressValues = Object.values(state.progress);
            const avgScore = progressValues.length > 0 ? Math.round(progressValues.reduce((acc, p) => acc + p.bestScore, 0) / progressValues.length) : 0;

            const todayStr = getTodayStr();
            const todayTime = formatTime(state.timeStats[todayStr] || 0);
            const totalTimeSecs = Object.values(state.timeStats).reduce((a,b) => a+b, 0);
            const totalTime = formatTime(totalTimeSecs);

            const last7DaysHTML = Array.from({length: 7}).map((_, i) => {
                const d = new Date();
                d.setDate(d.getDate() - (6 - i));
                const dayStr = d.toISOString().split('T')[0];
                const shortDay = d.toLocaleDateString('ru-RU', { weekday: 'short' });
                const secs = state.timeStats[dayStr] || 0;
                
                const maxSecs = Math.max(...Array.from({length: 7}).map((_, j) => {
                    const d2 = new Date(); d2.setDate(d2.getDate() - j);
                    return state.timeStats[d2.toISOString().split('T')[0]] || 0;
                })) || 1; 
                
                const heightPct = Math.max((secs / maxSecs) * 100, 2); 

                return `
                   <div class="flex flex-col items-center gap-1 flex-1">
                     <div class="w-full max-w-[40px] bg-[#FAF7F2] rounded-t-lg flex items-end h-24 md:h-32">
                        <div class="w-full bg-[#4A90D9] rounded-t-lg transition-all duration-1000" style="height: ${heightPct}%" title="${formatTime(secs)}"></div>
                     </div>
                     <div class="text-[10px] md:text-xs font-bold text-[#7A7570] capitalize">${shortDay}</div>
                     <div class="text-[9px] md:text-[10px] text-[#2D2A26] font-bold">${secs >= 60 ? Math.floor(secs/60) + 'м' : ''}</div>
                   </div>
                `;
            }).join('');

            return `
              <div class="flex-grow flex flex-col w-full max-w-[1200px] mx-auto px-4 md:px-6 pt-4 md:pt-6 pb-8">
                <h2 class="text-2xl md:text-3xl font-bold mb-4 md:mb-6">Подробная статистика</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 mb-4 md:mb-6">
                   <div class="bg-white p-6 md:p-8 rounded-2xl md:rounded-3xl border border-[#E8E4DF] shadow-sm flex flex-col justify-center items-center text-center">
                      <div class="text-[#F5A623] mb-2 md:mb-4"><i class="ph-fill ph-medal text-5xl md:text-6xl"></i></div>
                      <h3 class="font-bold text-lg md:text-xl text-[#7A7570] mb-1 md:mb-2">Общий средний балл</h3>
                      <div class="text-5xl md:text-6xl font-black text-[#2D2A26]">${avgScore}</div>
                   </div>
                   <div class="bg-white p-6 md:p-8 rounded-2xl md:rounded-3xl border border-[#E8E4DF] shadow-sm">
                     <h3 class="font-bold text-lg md:text-xl mb-4 md:mb-6 text-[#2D2A26]">Изучение разделов</h3>
                     ${sectionsHTML}
                   </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 mb-8">
                   <div class="bg-white p-6 md:p-8 rounded-2xl md:rounded-3xl border border-[#E8E4DF] shadow-sm flex flex-col">
                      <div class="flex items-center gap-2 md:gap-3 mb-4 md:mb-6">
                          <i class="ph-fill ph-clock text-2xl md:text-3xl text-[#4A90D9]"></i>
                          <h3 class="font-bold text-lg md:text-xl text-[#2D2A26]">Время занятий</h3>
                      </div>
                      <div class="flex flex-col gap-4 mt-auto">
                          <div class="flex justify-between items-center border-b border-[#E8E4DF] pb-3">
                              <span class="text-[#7A7570] font-bold text-sm md:text-base">Сегодня:</span>
                              <span class="text-xl md:text-2xl font-black text-[#4A90D9]">${todayTime}</span>
                          </div>
                          <div class="flex justify-between items-center">
                              <span class="text-[#7A7570] font-bold text-sm md:text-base">Всего времени:</span>
                              <span class="text-xl md:text-2xl font-black text-[#2D2A26]">${totalTime}</span>
                          </div>
                      </div>
                   </div>
                   <div class="bg-white p-6 md:p-8 rounded-2xl md:rounded-3xl border border-[#E8E4DF] shadow-sm flex flex-col">
                      <h3 class="font-bold text-lg md:text-xl text-[#2D2A26] mb-6">Активность (за 7 дней)</h3>
                      <div class="flex justify-between items-end mt-auto gap-1 sm:gap-2">
                          ${last7DaysHTML}
                      </div>
                   </div>
                </div>

              </div>
            `;
          }

          if (state.view === 'comparison') {
            const plan = PLANS_DB.find(p => p.id === state.selectedPlanId);
            const res = state.comparisonResult;
            const hasNextInPlaylist = state.playlist.length > 0 && state.playlistIndex < state.playlist.length - 1;
            
            const referenceHTML = res.results.map((pm, idx) => `
              <div class="border-l-2 md:border-l-4 pl-1.5 sm:pl-3 md:pl-4 py-0.5 md:py-1" style="border-color: ${pm.matched ? '#5CB85C' : '#E74C3C'}">
                <div class="flex items-start gap-1 md:gap-2 cursor-pointer hover:bg-gray-100 p-0.5 sm:p-1 md:p-1.5 -ml-1 md:-ml-1.5 rounded-lg transition-colors select-none group" onclick="actions.toggleMatch(${idx})" title="Кликните, чтобы изменить оценку пункта">
                  ${pm.matched ? '<i class="ph-fill ph-check-circle text-[#5CB85C] mt-[2px] md:mt-[3px] shrink-0 group-hover:scale-110 transition-transform text-sm md:text-lg"></i>' : '<i class="ph-fill ph-x-circle text-[#E74C3C] mt-[2px] md:mt-[3px] shrink-0 group-hover:scale-110 transition-transform text-sm md:text-lg"></i>'}
                  <span class="font-bold text-[11px] sm:text-[13px] md:text-base leading-tight ${pm.matched ? 'text-[#2D2A26]' : 'text-[#7A7570]'}">${idx + 1}. ${pm.text}</span>
                </div>
                ${pm.subpoints.length > 0 ? `
                  <ul class="mt-0.5 md:mt-2 space-y-0.5 md:space-y-1">
                    ${pm.subpoints.map((sm, subIdx) => `
                      <li class="flex items-start gap-1 md:gap-2 pl-3 sm:pl-5 md:pl-6 p-0.5 md:p-1 -ml-1 rounded-lg select-none ${res.ignoreSubpoints ? '' : 'cursor-pointer hover:bg-gray-100 transition-colors group'}" ${!res.ignoreSubpoints ? `onclick="actions.toggleMatch(${idx}, ${subIdx})"` : ''}>
                        ${res.ignoreSubpoints ? '<span class="text-[#7A7570] font-bold opacity-50 text-[10px] md:text-lg mt-[-2px]">•</span>' : (sm.matched ? '<span class="text-[#5CB85C] font-bold group-hover:scale-125 transition-transform inline-block text-[10px] sm:text-[12px] md:text-base mt-[2px] md:mt-0">✓</span>' : '<span class="text-[#E74C3C] font-bold opacity-50 group-hover:scale-125 transition-transform inline-block text-[10px] sm:text-[12px] md:text-base mt-[2px] md:mt-0">✗</span>')}
                        <span class="text-[10px] sm:text-[12px] md:text-sm leading-tight ${!res.ignoreSubpoints && sm.matched ? 'text-[#2D2A26]' : 'text-[#7A7570] opacity-80'}">${String.fromCharCode(1072 + subIdx)}) ${sm.text}</span>
                      </li>
                    `).join('')}
                  </ul>
                ` : ''}
                ${pm.subpoints.length > 0 && res.ignoreSubpoints ? `<div class="mt-1 md:mt-2 text-[9px] md:text-xs text-[#4A90D9] italic pl-3 sm:pl-5 md:pl-6">* В блице подпункты показаны для справки</div>` : ''}
              </div>
            `).join('');

            return `
              <div id="comparison-report" class="flex-grow flex flex-col w-full max-w-[1400px] mx-auto px-4 md:px-6 pt-4 md:pt-6 pb-8">
                 <div class="flex flex-col sm:flex-row justify-between items-center mb-6 print-hidden gap-3 shrink-0">
                  <button onclick="actions.setView('catalog')" class="w-full sm:w-auto flex items-center justify-center gap-2 text-[#7A7570] hover:text-[#2D2A26] font-medium transition-colors bg-white border border-[#E8E4DF] px-4 py-2.5 md:py-2 rounded-xl md:rounded-lg text-sm md:text-base shadow-sm">
                    <i class="ph ph-arrow-left text-lg"></i> Вернуться в каталог
                  </button>
                  <div class="flex w-full sm:w-auto gap-2">
                    ${res.isBlitz 
                      ? `<button onclick="actions.startBlitz()" class="flex-1 sm:flex-none flex items-center justify-center gap-1.5 bg-[#8E54E9] hover:bg-[#7a42d4] text-white font-bold px-3 py-2.5 md:py-2 rounded-xl md:rounded-lg transition-colors shadow-sm animate-pulse text-sm md:text-base"><i class="ph-fill ph-lightning text-lg"></i> След. Блиц</button>` 
                      : hasNextInPlaylist
                      ? `<button onclick="actions.nextPlaylistPlan()" class="flex-1 sm:flex-none flex items-center justify-center gap-1.5 bg-[#5CB85C] hover:bg-[#4CAe4C] text-white font-bold px-3 py-2.5 md:py-2 rounded-xl md:rounded-lg transition-colors shadow-sm animate-pulse text-sm md:text-base"><i class="ph-fill ph-magic-wand text-lg"></i> След. по шаблону</button>`
                      : ''}
                    <button id="screenshot-btn" onclick="actions.copyScreenshot()" class="flex-1 sm:flex-none flex items-center justify-center gap-1.5 text-[#4A90D9] bg-[#4A90D9]/10 hover:bg-[#4A90D9]/20 font-bold px-3 py-2.5 md:py-2 rounded-xl md:rounded-lg transition-all text-sm md:text-base border border-transparent"><i class="ph ph-camera text-lg"></i> Сохранить отчёт</button>
                  </div>
                </div>

                <div id="screenshot-target" class="flex flex-col gap-4 bg-[#FAF7F2] p-2 -mx-2 md:p-0 md:mx-0 rounded-2xl">
                  
                  <!-- Карточка результата -->
                  <div class="bg-white rounded-xl md:rounded-3xl border border-[#E8E4DF] p-4 md:p-6 flex flex-row items-center justify-between shadow-sm relative">
                    <div class="absolute -top-3 right-4 bg-blue-50 text-[#4A90D9] text-[10px] font-bold px-2 py-1 rounded-lg flex items-center gap-1 animate-bounce print-hidden shadow-sm border border-blue-100" data-html2canvas-ignore>
                       <i class="ph-fill ph-cursor-click"></i> Алгоритм ошибся? Кликайте на значки!
                    </div>
                    <div class="pr-4">
                      <h2 class="text-[11px] md:text-xs font-bold text-[#7A7570] uppercase tracking-wider mb-0.5">Результат:</h2>
                      <p class="text-sm md:text-lg font-bold text-[#2D2A26] leading-tight">«${plan.topic}»</p>
                    </div>
                    <div class="flex items-baseline gap-1 text-right shrink-0">
                      <span class="text-3xl md:text-5xl font-black ${res.score >= 80 ? 'text-[#5CB85C]' : res.score >= 50 ? 'text-[#F5A623]' : 'text-[#E74C3C]'}">${res.score}</span>
                      <span class="text-lg md:text-2xl text-[#7A7570] font-bold">/100</span>
                    </div>
                  </div>

                  <!-- РАЗДЕЛЕННЫЙ ЭКРАН - ОТВЕТ СЛЕВА, ЭТАЛОН СПРАВА -->
                  <div class="grid grid-cols-2 gap-2 md:gap-4 items-start">
                    
                    <div class="bg-white border border-[#E8E4DF] rounded-xl md:rounded-3xl flex flex-col shadow-sm overflow-hidden">
                      <div class="p-2 md:p-4 border-b border-[#E8E4DF] bg-gray-50/50 flex items-center shrink-0">
                        <h3 class="font-bold text-[11px] sm:text-sm md:text-base text-[#7A7570] truncate">Ваш ответ</h3>
                      </div>
                      <div class="p-2 sm:p-4 md:p-5 font-mono text-[10px] sm:text-[13px] md:text-[14px] leading-relaxed whitespace-pre-wrap text-[#2D2A26] break-words overflow-x-hidden">
                        ${state.userDraft || "Пустой ответ"}
                      </div>
                    </div>
                    
                    <div class="bg-white border border-[#E8E4DF] rounded-xl md:rounded-3xl flex flex-col shadow-sm overflow-hidden">
                      <div class="p-2 md:p-4 border-b border-[#E8E4DF] bg-gray-50/50 flex items-center shrink-0">
                        <h3 class="font-bold text-[11px] sm:text-sm md:text-base text-[#5CB85C] truncate">Эталон ФИПИ</h3>
                      </div>
                      <div class="p-2 sm:p-4 md:p-5 space-y-2 sm:space-y-4 md:space-y-5 overflow-x-hidden">
                        ${referenceHTML}
                      </div>
                    </div>

                  </div>
                </div>
                
                <div class="mt-6 md:mt-8 flex justify-center print-hidden">
                   <button onclick="actions.setView('catalog')" class="w-full sm:w-auto bg-[#2D2A26] hover:bg-black text-white font-bold py-3 md:py-3 px-8 rounded-xl transition-colors shadow-md text-sm md:text-base">Вернуться в каталог</button>
                </div>
              </div>
            `;
          }
          return '';
        }

        // МОДАЛКА ШАБЛОНА (ВОЗВРАЩЕНА)
        function getTemplateModalHTML() {
          if (!state.viewTemplateModal) return '';
          const template = TEMPLATES.find(t => t.id === state.viewTemplateModal);
          if (!template) return '';
          
          return `
            <div class="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
              <div class="bg-white rounded-2xl md:rounded-3xl shadow-2xl max-w-2xl w-full flex flex-col max-h-[90vh]">
                <div class="p-4 md:p-6 border-b border-[#E8E4DF] flex justify-between items-center bg-gray-50/50 shrink-0 rounded-t-2xl md:rounded-t-3xl">
                  <h3 class="text-lg md:text-xl font-bold">Скелет шаблона</h3>
                  <button onclick="actions.closeTemplateModal()" class="text-[#7A7570] hover:text-[#E74C3C] transition-colors p-1"><i class="ph ph-x text-xl md:text-2xl"></i></button>
                </div>
                <div class="p-5 md:p-8 overflow-y-auto custom-scroll">
                  <div class="text-[#4A90D9] font-bold text-lg mb-4 flex items-center gap-2">
                    <i class="ph-fill ph-magic-wand"></i> ${template.name}
                  </div>
                  <div class="bg-[#FAF7F2] p-4 rounded-xl border border-[#E8E4DF] mb-6">
                    ${renderSkeleton(template)}
                  </div>
                  <div class="bg-yellow-50 text-yellow-800 p-4 rounded-xl border border-yellow-100 text-sm">
                     <b>💡 Лайфхак:</b> ${template.tip}
                  </div>
                </div>
              </div>
            </div>
          `;
        }

        // НОВОЕ МОДАЛЬНОЕ ОКНО ДЛЯ КАРТИНКИ (ФОЛБЭК ДЛЯ ТЕЛЕФОНОВ)
        function getImageModalHTML() {
          if (!state.imageModalData) return '';
          return `
            <div class="fixed inset-0 bg-black/90 z-[200] flex flex-col items-center justify-center p-4 backdrop-blur-sm transition-opacity" onclick="actions.closeImageModal()">
              <div class="bg-white rounded-2xl md:rounded-3xl shadow-2xl max-w-lg w-full flex flex-col max-h-[90vh] overflow-hidden" onclick="event.stopPropagation()">
                <div class="p-4 border-b border-[#E8E4DF] flex justify-between items-center bg-gray-50/50 shrink-0">
                  <h3 class="font-bold text-lg text-[#2D2A26]">Отправка отчёта</h3>
                  <button onclick="actions.closeImageModal()" class="text-[#7A7570] hover:text-[#E74C3C] transition-colors p-1"><i class="ph ph-x text-xl"></i></button>
                </div>
                <div class="p-4 overflow-y-auto custom-scroll flex-grow text-center flex flex-col items-center bg-[#FAF7F2]">
                  <div class="bg-blue-50 text-[#4A90D9] p-3 rounded-xl border border-blue-100 text-sm font-bold mb-4 w-full flex items-center justify-center gap-2">
                     <i class="ph-fill ph-hand-tap text-lg"></i> Удерживайте картинку пальцем
                  </div>
                  <p class="text-xs text-[#7A7570] mb-4">Появится системное меню телефона, чтобы сохранить её в галерею или переслать учителю в Telegram/WhatsApp.</p>
                  
                  <img src="${state.imageModalData}" class="max-w-full h-auto rounded-xl shadow-md border border-[#E8E4DF] select-none" alt="Скриншот отчёта">
                  
                </div>
                <div class="p-4 bg-gray-50/50 border-t border-[#E8E4DF]">
                   <button onclick="actions.closeImageModal()" class="w-full bg-[#2D2A26] text-white font-bold py-3 rounded-xl hover:bg-black transition-colors shadow-sm">Закрыть</button>
                </div>
              </div>
            </div>
          `;
        }

        function getModalHTML() {
          if (!state.modeSelectorId) return '';
          const isPlaylist = state.playlist.length > 0;

          return `
            <div class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
              <div class="bg-white rounded-2xl md:rounded-3xl shadow-2xl max-w-2xl w-full border border-[#E8E4DF] flex flex-col max-h-[90vh]">
                <div class="p-4 md:p-6 border-b border-[#E8E4DF] flex justify-between items-center bg-gray-50/50 shrink-0 rounded-t-2xl md:rounded-t-3xl">
                  <div>
                    <h3 class="text-lg md:text-xl font-bold">Выберите режим</h3>
                    ${isPlaylist ? `<div class="text-[11px] md:text-xs text-[#F5A623] font-bold mt-1 bg-yellow-50 border border-yellow-100 inline-block px-2 py-0.5 rounded-md">Серия: ${state.playlist.length} планов</div>` : ''}
                  </div>
                  <button onclick="actions.closeModal()" class="text-[#7A7570] hover:text-[#E74C3C] transition-colors p-1"><i class="ph ph-x text-xl md:text-2xl"></i></button>
                </div>
                <div class="p-4 md:p-6 grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4 overflow-y-auto custom-scroll">
                  
                  <button onclick="actions.startTraining(${state.modeSelectorId}, 'study')" class="sm:col-span-2 text-left p-4 md:p-6 rounded-xl md:rounded-2xl border-2 border-[#E8E4DF] hover:border-[#5CB85C] hover:bg-[#5CB85C]/5 transition-all group flex flex-col sm:flex-row sm:items-center gap-3 md:gap-4">
                    <div class="bg-[#5CB85C]/10 text-[#5CB85C] w-10 h-10 md:w-14 md:h-14 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform shrink-0">
                      <i class="ph-fill ph-student text-xl md:text-3xl"></i>
                    </div>
                    <div>
                      <h4 class="font-bold text-base md:text-lg mb-1">Изучить план</h4>
                      <p class="text-xs md:text-sm text-[#7A7570] leading-tight">Прочитайте структуру идеального ответа перед проверкой.</p>
                    </div>
                  </button>

                  <button onclick="actions.startTraining(${state.modeSelectorId}, 'blanks')" class="text-left p-4 md:p-6 rounded-xl md:rounded-2xl border-2 border-[#E8E4DF] hover:border-[#F5A623] hover:bg-[#F5A623]/5 transition-all group flex flex-col sm:block">
                    <div class="bg-[#F5A623]/10 text-[#F5A623] w-10 h-10 md:w-12 md:h-12 rounded-xl flex items-center justify-center mb-3 md:mb-4 group-hover:scale-110 transition-transform shrink-0">
                      <i class="ph-fill ph-puzzle-piece text-xl md:text-2xl"></i>
                    </div>
                    <div>
                      <h4 class="font-bold text-base md:text-lg mb-1 md:mb-2">Заполнить пробелы</h4>
                      <p class="text-xs md:text-sm text-[#7A7570] leading-tight">Отличный вариант для начального этапа.</p>
                    </div>
                  </button>

                  <button onclick="actions.startTraining(${state.modeSelectorId}, 'classic')" class="text-left p-4 md:p-6 rounded-xl md:rounded-2xl border-2 border-[#E8E4DF] hover:border-[#4A90D9] hover:bg-[#4A90D9]/5 transition-all group flex flex-col sm:block">
                    <div class="bg-[#4A90D9]/10 text-[#4A90D9] w-10 h-10 md:w-12 md:h-12 rounded-xl flex items-center justify-center mb-3 md:mb-4 group-hover:scale-110 transition-transform shrink-0">
                      <i class="ph-fill ph-pen-nib text-xl md:text-2xl"></i>
                    </div>
                    <div>
                      <h4 class="font-bold text-base md:text-lg mb-1 md:mb-2">Написать с нуля</h4>
                      <p class="text-xs md:text-sm text-[#7A7570] leading-tight">Пустой лист, максимальная эффективность.</p>
                    </div>
                  </button>

                </div>
              </div>
            </div>
          `;
        }

        // --- 7. ОТРИСОВКА (RENDER) ---
        function render() {
          const app = document.getElementById('app');
          app.innerHTML = `
            ${getHeaderHTML()}
            <main class="flex-grow flex flex-col w-full" id="main-content">
               ${getViewHTML()}
            </main>
            ${getModalHTML()}
            ${getTemplateModalHTML()}
            ${getImageModalHTML()}
          `;
        }

        // Инициализация при загрузке
        const initApp = () => {
          const today = getTodayStr();
          if (state.streak.lastActive !== today && state.streak.lastActive !== null) {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            if (state.streak.lastActive !== yesterday.toISOString().split('T')[0]) {
               state.streak.count = 0; 
               localStorage.setItem('ege_plan_streak', JSON.stringify(state.streak));
            }
          }
          
          state.view = 'dashboard';
          render();

          // Глобальный таймер учета времени
          setInterval(() => {
            if (['study', 'training', 'training_blanks', 'blitz'].includes(state.view)) {
              const currentToday = getTodayStr();
              state.timeStats[currentToday] = (state.timeStats[currentToday] || 0) + 1;
              
              // Локальное сохранение каждые 10 секунд
              if (state.timeStats[currentToday] % 10 === 0) {
                 localStorage.setItem('ege_plan_time_stats', JSON.stringify(state.timeStats));
              }
              // Фоновое сохранение в облако каждую минуту активного таймера
              if (state.timeStats[currentToday] % 60 === 0) {
                 saveProgressToCloud();
              }
            }
          }, 1000);

          const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token).catch(console.warn);
            }
          };

          initAuth().then(() => {
            onAuthStateChanged(auth, async (user) => {
              state.isAuthReady = true;
              if (user) {
                currentUser = user;
                await loadUserData();
                
                // ИСПРАВЛЕНИЕ ЗАВИСАНИЯ АВТОРИЗАЦИИ ПРИ ВХОДЕ ЧЕРЕЗ SESSION
                if (state.view === 'auth') {
                  state.view = 'dashboard';
                }
                render();
              } else {
                currentUser = null;
                render();
              }
            });
          }).catch(err => {
             console.error("Фоновая ошибка Firebase:", err);
             state.isAuthReady = true;
             render();
          });
        };

        initApp();

      } catch (err) {
        console.error(err);
        showErrorUI(err.message);
      }
    }

    bootstrap();

  </script>
</body>
</html>
