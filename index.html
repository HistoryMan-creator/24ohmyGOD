<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ЕГЭ Plan Master</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Иконки Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <!-- Шрифты -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Nunito', sans-serif; }
    
    /* Скрытие полосы прокрутки для фильтров, но сохранение скролла */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* Стили для корректной печати при фиксированной высоте экранов */
    @media print {
      body, #app, main, .overflow-y-auto { 
        height: auto !important; 
        overflow: visible !important; 
        display: block !important; 
        background: white !important;
      }
      header { display: none; }
      .print-hidden { display: none !important; }
      #comparison-report { margin: 0; padding: 0; box-shadow: none; border: none; }
    }
  </style>
</head>
<!-- h-screen и overflow-hidden делают основную страницу без общего скролла -->
<body class="bg-[#FAF7F2] text-[#2D2A26] selection:bg-[#4A90D9] selection:text-white h-screen flex flex-col overflow-hidden">

  <div id="app" class="flex-grow flex flex-col h-full overflow-hidden">
    <!-- Заглушка загрузки -->
    <div class="flex-grow flex items-center justify-center">
      <div class="animate-pulse flex flex-col items-center">
        <i class="ph ph-spinner-gap animate-spin text-4xl text-[#4A90D9] mb-4"></i>
        <p class="text-[#7A7570] font-bold">Подключение к базе данных...</p>
      </div>
    </div>
  </div>

  <script type="module">
    function showErrorUI(errorMessage) {
      document.getElementById('app').innerHTML = `
        <div class="flex flex-col items-center justify-center p-4 text-center h-full overflow-y-auto">
          <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="#E74C3C" viewBox="0 0 256 256" class="mb-5 shrink-0">
            <path d="M236.8,188.09,149.35,36.22h0a24.76,24.76,0,0,0-42.7,0L19.2,188.09a23.51,23.51,0,0,0,0,23.72A24.35,24.35,0,0,0,40.55,224h174.9a24.35,24.35,0,0,0,21.33-12.19A23.51,23.51,0,0,0,236.8,188.09ZM222.93,203.8a8.5,8.5,0,0,1-7.48,4.2H40.55a8.5,8.5,0,0,1-7.48-4.2,7.59,7.59,0,0,1,0-7.72L120.52,44.21a8.75,8.75,0,0,1,15,0l87.45,151.87A7.59,7.59,0,0,1,222.93,203.8ZM120,144V104a8,8,0,0,1,16,0v40a8,8,0,0,1-16,0Zm20,36a12,12,0,1,1-12-12A12,12,0,0,1,140,180Z"></path>
          </svg>
          <h1 class="text-2xl md:text-3xl font-extrabold text-[#2D2A26] mb-3">Ошибка загрузки приложения</h1>
          <p class="text-[#7A7570] text-base md:text-lg max-w-2xl leading-relaxed mb-6">
            ${errorMessage}
          </p>
          <div class="bg-[#FFF0E5] text-left p-6 rounded-2xl border border-[#F5A623] max-w-2xl w-full shadow-sm">
            <p class="font-bold text-[#2D2A26] mb-3 text-lg">🛠️ Как исправить на GitHub Pages:</p>
            <ul class="list-disc pl-5 space-y-2 text-[#7A7570]">
              <li>Убедитесь, что вы загрузили файл <b class="text-[#2D2A26]">ege_plans_db.js</b> в тот же репозиторий.</li>
              <li>Убедитесь, что имя файла совпадает буква-в-букву (без заглавных букв).</li>
              <li><b>Подождите 2-3 минуты</b> и обновите страницу. Серверам GitHub нужно время на публикацию новых файлов.</li>
            </ul>
          </div>
        </div>
      `;
    }

    window.addEventListener('unhandledrejection', function(event) {
      showErrorUI(event.reason.message || "Неизвестная ошибка загрузки.");
    });

    async function bootstrap() {
      try {
        // 1. ИМПОРТ БАЗЫ ДАННЫХ
        let dbModule;
        try {
          dbModule = await import('./ege_plans_db.js');
        } catch (e) {
          throw new Error(`Файл базы данных не найден (Ошибка 404). Сервер не смог загрузить ege_plans_db.js. ` + e.message);
        }
        
        const RAW_PLANS = dbModule.RAW_PLANS || dbModule.PLANS;

        if (!RAW_PLANS || !Array.isArray(RAW_PLANS)) {
          throw new Error("Файл загружен, но не удалось найти массив данных внутри ege_plans_db.js.");
        }

        // --- 2. ПАРСЕРЫ И АДАПТЕРЫ ---
        const parseReferencePlan = (text) => {
          if (!text) return { points: [] };
          const lines = text.split('\n').map(l => l.trim()).filter(l => l);
          const points = [];
          let currentPoint = null;

          lines.forEach(line => {
            let cleanLine = line.replace(/^>\s*/, '').replace(/\\\*/g, '*').trim();
            if (!cleanLine) return;

            const pointMatch = cleanLine.match(/^(\d+)\.?\s+(.*)/);
            const subpointMatch = cleanLine.match(/^([а-яa-zа-яё])\)\s+(.*)/i) || cleanLine.match(/^-\s+(.*)/);

            if (pointMatch && !subpointMatch) {
              currentPoint = { text: pointMatch[2].replace(/[:;.]+$/, '').trim(), subpoints: [] };
              points.push(currentPoint);
            } else if (subpointMatch && currentPoint) {
              currentPoint.subpoints.push(subpointMatch[2].replace(/[;.]+$/, '').trim());
            }
          });
          return { points };
        };

        const PLANS_DB = RAW_PLANS.map(p => ({
          id: p.id,
          topic: p.title || "Без названия",
          aliases: p.aliases || [],
          section: p.block || "Без раздела",
          difficulty: p.mandatoryPoints && p.mandatoryPoints.length >= 4 ? "hard" : p.mandatoryPoints && p.mandatoryPoints.length <= 2 ? "easy" : "medium",
          plan: parseReferencePlan(p.referencePlan),
          mandatoryPoints: p.mandatoryPoints || []
        }));

        // Извлекаем уникальные разделы для фильтров
        const UNIQUE_BLOCKS = ['all', ...new Set(PLANS_DB.map(p => p.section).filter(Boolean))];

        // --- 3. АЛГОРИТМЫ СРАВНЕНИЯ ---
        const STOP_WORDS = new Set(["и", "в", "во", "не", "что", "он", "на", "я", "с", "со", "как", "а", "то", "все", "она", "так", "его", "но", "да", "ты", "к", "у", "же", "вы", "за", "бы", "по", "только", "ее", "мне", "было", "вот", "от", "меня", "еще", "нет", "о", "из", "ему", "теперь", "когда", "даже", "ну", "вдруг", "ли", "если", "уже", "или", "ни", "быть", "был", "него", "до", "вас", "нибудь", "опять", "уж", "вам", "ведь", "там", "потом", "себя", "ничего", "ей", "может", "они", "тут", "где", "есть", "надо", "ней", "для", "мы", "тебя", "их", "чем", "была", "сам", "чтоб", "без", "будто", "чего", "раз", "тоже", "себе", "под", "будет", "ж", "тогда", "кто", "этот", "того", "потому", "этого", "какой", "совсем", "ним", "здесь", "этом", "один", "почти", "мой", "тем", "чтобы", "нее", "сейчас", "были", "куда", "зачем", "всех", "никогда", "можно", "при", "наконец", "два", "об", "другой", "хоть", "после", "над", "больше", "тот", "через", "эти", "нас", "про", "всего", "них", "какая", "много", "разве", "три", "эту", "моя", "впрочем", "хорошо", "свою", "этой", "перед", "иногда", "лучше", "чуть", "том", "нельзя", "такой", "им", "более", "всегда", "конечно", "всю", "между"]);

        const normalizeText = (text) => {
          if (!text) return [];
          return text.toLowerCase().replace(/[.,:;!?()\[\]"']/g, ' ').split(/\s+/).filter(word => word.length > 2 && !STOP_WORDS.has(word));
        };

        const jaccardIndex = (words1, words2) => {
          const set1 = new Set(words1);
          const set2 = new Set(words2);
          const intersection = new Set([...set1].filter(x => set2.has(x)));
          const union = new Set([...set1, ...set2]);
          if (union.size === 0) return 0;
          return intersection.size / union.size;
        };

        const parseUserText = (text) => {
          const lines = text.split('\n').filter(l => l.trim() !== '');
          const parsed = [];
          let currentPoint = null;

          lines.forEach(line => {
            if (line.startsWith(' ') || line.startsWith('\t') || line.trim().startsWith('-') || /^[а-яa-z]\)/.test(line.trim())) {
              if (currentPoint) {
                currentPoint.subpoints.push(line.trim().replace(/^-/, '').trim());
              } else {
                currentPoint = { text: "Без заголовка", subpoints: [line.trim()] };
                parsed.push(currentPoint);
              }
            } else {
              currentPoint = { text: line.trim(), subpoints: [] };
              parsed.push(currentPoint);
            }
          });
          return parsed;
        };

        const comparePlans = (userPlanText, referencePlan, ignoreSubpoints = false, isBlitz = false) => {
          const userParsed = parseUserText(userPlanText);
          const THRESHOLD = 0.35;
          
          let scorePoints = 0;
          let scoreSubpoints = 0;
          
          const totalRefPoints = referencePlan.points.length;
          let totalRefSubpoints = 0;
          
          const matchResults = referencePlan.points.map(refPoint => {
            if (!ignoreSubpoints) totalRefSubpoints += refPoint.subpoints.length;
            
            const refWords = normalizeText(refPoint.text);
            let bestMatch = null;
            let bestScore = 0;
            
            userParsed.forEach(userPoint => {
              const userWords = normalizeText(userPoint.text);
              const score = jaccardIndex(refWords, userWords);
              if (score > bestScore) {
                bestScore = score;
                bestMatch = userPoint;
              }
            });

            const isPointMatched = bestScore >= THRESHOLD;
            if (isPointMatched) scorePoints++;

            const subpointMatches = refPoint.subpoints.map(refSub => {
              const refSubWords = normalizeText(refSub);
              let isSubMatched = false;
              if (isPointMatched && bestMatch && !ignoreSubpoints) {
                bestMatch.subpoints.forEach(userSub => {
                  if (jaccardIndex(refSubWords, normalizeText(userSub)) >= THRESHOLD) isSubMatched = true;
                });
              }
              if (isSubMatched && !ignoreSubpoints) scoreSubpoints++;
              return { text: refSub, matched: isSubMatched };
            });

            return {
              text: refPoint.text,
              matched: isPointMatched,
              subpoints: subpointMatches,
              userTextMatched: isPointMatched ? bestMatch?.text : null
            };
          });

          const pointWeight = ignoreSubpoints ? 100 : 50;
          const subpointWeight = ignoreSubpoints ? 0 : 50;
          
          const pointsScore = totalRefPoints > 0 ? (scorePoints / totalRefPoints) * pointWeight : 0;
          const subpointsScore = totalRefSubpoints > 0 && !ignoreSubpoints ? (scoreSubpoints / totalRefSubpoints) * subpointWeight : subpointWeight;
          
          return { results: matchResults, score: Math.round(pointsScore + subpointsScore), ignoreSubpoints, isBlitz };
        };

        const getTodayStr = () => new Date().toISOString().split('T')[0];
        
        const calculateNextReview = (attempts, score, lastDate) => {
          const baseDate = new Date(lastDate);
          let addDays = 0;
          if (score >= 90) {
            if (attempts === 1) addDays = 1;
            else if (attempts === 2) addDays = 3;
            else if (attempts === 3) addDays = 7;
            else if (attempts === 4) addDays = 14;
            else addDays = 30;
          } else {
            if (attempts <= 2) addDays = 1;
            else if (attempts === 3) addDays = 3;
            else addDays = 7;
          }
          baseDate.setDate(baseDate.getDate() + addDays);
          return baseDate.toISOString().split('T')[0];
        };

        // --- 4. ГЛОБАЛЬНОЕ СОСТОЯНИЕ (STATE) ---
        const state = {
          view: 'dashboard',
          searchQuery: '',
          selectedBlock: 'all',
          selectedPlanId: null,
          userDraft: '',
          comparisonResult: null,
          modeSelectorId: null,
          blanksData: [],
          timeLeft: 60,
          timerRef: null,
          progress: JSON.parse(localStorage.getItem('ege_plan_progress') || '{}'),
          streak: JSON.parse(localStorage.getItem('ege_plan_streak') || '{"count": 0, "lastActive": null}')
        };

        // --- 5. ДЕЙСТВИЯ (ACTIONS) ---
        window.actions = {
          setView: (v) => { state.view = v; render(); },
          
          setSearch: (v) => { 
            state.searchQuery = v; 
            document.getElementById('catalog-grid').innerHTML = generateCatalogGrid(); 
          },

          setBlock: (b) => {
            state.selectedBlock = b;
            document.getElementById('block-filters').innerHTML = generateBlockFilters();
            document.getElementById('catalog-grid').innerHTML = generateCatalogGrid();
          },

          updateDraft: (val) => {
            state.userDraft = val;
            const btn = document.getElementById('check-btn');
            if (btn) btn.disabled = val.trim().length < 10;
          },

          updateBlank: (idx, val) => {
            state.blanksData[idx].userInput = val;
          },

          useHint: () => {
            const plan = PLANS_DB.find(p => p.id === state.selectedPlanId);
            if(plan && plan.plan.points.length > 0) {
              state.userDraft = "1. " + plan.plan.points[0].text + "\n";
              const ta = document.getElementById('draft-area');
              if(ta) {
                  ta.value = state.userDraft;
                  actions.updateDraft(state.userDraft);
              }
            }
          },

          startTraining: (id, mode = 'classic') => {
            state.selectedPlanId = id;
            state.modeSelectorId = null;
            state.comparisonResult = null;

            if (mode === 'classic') {
              state.userDraft = '';
              state.view = 'training';
            } else if (mode === 'blanks') {
              const planData = PLANS_DB.find(p => p.id === id);
              const items = [];
              planData.plan.points.forEach((p, pIdx) => {
                let pointHidden = Math.random() > 0.6;
                let subpointsHidden = p.subpoints.map(() => Math.random() > 0.4);
                
                // Проверка: гарантируем, что хотя бы что-то из группы будет видно (пункт или один подпункт)
                let allHidden = pointHidden && subpointsHidden.every(sh => sh === true);
                
                if (allHidden) {
                  const totalItems = 1 + p.subpoints.length;
                  const forceVisibleIdx = Math.floor(Math.random() * totalItems);
                  if (forceVisibleIdx === 0) {
                    pointHidden = false; // Открываем главный пункт
                  } else {
                    subpointsHidden[forceVisibleIdx - 1] = false; // Открываем случайный подпункт
                  }
                }

                items.push({ id: `p_${pIdx}`, type: 'point', text: p.text, hidden: pointHidden, userInput: '' });
                p.subpoints.forEach((sp, spIdx) => {
                  items.push({ id: `s_${pIdx}_${spIdx}`, type: 'subpoint', text: sp, hidden: subpointsHidden[spIdx], userInput: '' });
                });
              });
              state.blanksData = items;
              state.view = 'training_blanks';
            }
            render();
          },

          startBlitz: () => {
            if(PLANS_DB.length === 0) return;
            const randomPlan = PLANS_DB[Math.floor(Math.random() * PLANS_DB.length)];
            state.selectedPlanId = randomPlan.id;
            state.userDraft = '';
            state.comparisonResult = null;
            state.timeLeft = 60;
            state.view = 'blitz';
            render();

            clearInterval(state.timerRef);
            state.timerRef = setInterval(() => {
              if (state.timeLeft > 0) {
                state.timeLeft--;
                const timerEl = document.getElementById('blitz-timer');
                if (timerEl) {
                  timerEl.innerText = `00:${state.timeLeft.toString().padStart(2, '0')}`;
                  if (state.timeLeft <= 10) {
                    timerEl.classList.add('text-[#E74C3C]', 'border-[#E74C3C]', 'animate-pulse');
                    timerEl.classList.remove('text-[#4A90D9]', 'border-[#E8E4DF]');
                  }
                }
              } else {
                clearInterval(state.timerRef);
                window.actions.finishTraining(true);
              }
            }, 1000);
          },

          finishTraining: (isBlitz = false) => {
            clearInterval(state.timerRef);
            const plan = PLANS_DB.find(p => p.id === state.selectedPlanId);
            const result = comparePlans(state.userDraft, plan.plan, isBlitz, isBlitz);
            state.comparisonResult = result;
            saveProgress(result.score);
            state.view = 'comparison';
            render();
          },

          finishBlanks: () => {
            const plan = PLANS_DB.find(p => p.id === state.selectedPlanId);
            let correctCount = 0;
            let totalHidden = 0;
            let draftLines = [];
            
            const newResults = plan.plan.points.map((p, pIdx) => {
              const pointData = state.blanksData.find(item => item.id === `p_${pIdx}`);
              let isPointMatched = true;

              if (pointData && pointData.hidden) {
                totalHidden++;
                const score = jaccardIndex(normalizeText(pointData.text), normalizeText(pointData.userInput));
                isPointMatched = score >= 0.35;
                if (isPointMatched) correctCount++;
                draftLines.push(`${pIdx + 1}. ${pointData.userInput || '[пропуск]'}`);
              } else if (pointData) {
                draftLines.push(`${pIdx + 1}. ${pointData.text}`);
              }

              const subpointMatches = p.subpoints.map((sp, spIdx) => {
                const spData = state.blanksData.find(item => item.id === `s_${pIdx}_${spIdx}`);
                let isSpMatched = true;
                if (spData && spData.hidden) {
                  totalHidden++;
                  const score = jaccardIndex(normalizeText(spData.text), normalizeText(spData.userInput));
                  isSpMatched = score >= 0.35;
                  if (isSpMatched) correctCount++;
                  draftLines.push(`   - ${spData.userInput || '[пропуск]'}`);
                } else if (spData) {
                  draftLines.push(`   - ${spData.text}`);
                }
                return { text: sp, matched: isSpMatched };
              });

              return { text: p.text, matched: isPointMatched, subpoints: subpointMatches };
            });
            
            state.userDraft = draftLines.join('\n');
            const finalScore = totalHidden > 0 ? Math.round((correctCount / totalHidden) * 100) : 100;
            
            state.comparisonResult = { score: finalScore, results: newResults, ignoreSubpoints: false, isBlitz: false };
            saveProgress(finalScore);
            state.view = 'comparison';
            render();
          },

          toggleMatch: (pointIdx, subIdx = null) => {
            if (state.comparisonResult.ignoreSubpoints && subIdx !== null) return;

            const newResults = JSON.parse(JSON.stringify(state.comparisonResult.results));
            
            if (subIdx === null) {
              newResults[pointIdx].matched = !newResults[pointIdx].matched;
            } else {
              newResults[pointIdx].subpoints[subIdx].matched = !newResults[pointIdx].subpoints[subIdx].matched;
            }

            let scorePoints = 0, scoreSubpoints = 0, totalRefSubpoints = 0;
            const totalRefPoints = newResults.length;

            newResults.forEach(r => {
              if (r.matched) scorePoints++;
              if (!state.comparisonResult.ignoreSubpoints) {
                 totalRefSubpoints += r.subpoints.length;
                 r.subpoints.forEach(s => { if (s.matched) scoreSubpoints++; });
              }
            });

            const pointWeight = state.comparisonResult.ignoreSubpoints ? 100 : 50;
            const subpointWeight = state.comparisonResult.ignoreSubpoints ? 0 : 50;
            const pointsScore = totalRefPoints > 0 ? (scorePoints / totalRefPoints) * pointWeight : 0;
            const subpointsScore = totalRefSubpoints > 0 && !state.comparisonResult.ignoreSubpoints ? (scoreSubpoints / totalRefSubpoints) * subpointWeight : subpointWeight;
            const newTotalScore = Math.round(pointsScore + subpointsScore);

            state.comparisonResult.results = newResults;
            state.comparisonResult.score = newTotalScore;
            saveProgress(newTotalScore);
            render();
          },

          openModal: (id) => { state.modeSelectorId = id; render(); },
          closeModal: () => { state.modeSelectorId = null; render(); },
          printReport: () => window.print()
        };

        const saveProgress = (score) => {
          const today = getTodayStr();
          const prevData = state.progress[state.selectedPlanId] || { attempts: 0, bestScore: 0 };
          const newAttempts = prevData.attempts + 1;
          
          state.progress[state.selectedPlanId] = {
            attempts: newAttempts,
            lastAttempt: today,
            bestScore: Math.max(prevData.bestScore, score),
            lastScore: score,
            nextReview: calculateNextReview(newAttempts, score, today),
            status: score >= 90 && newAttempts >= 3 ? 'mastered' : score >= 70 ? 'almost' : 'learning'
          };
          
          localStorage.setItem('ege_plan_progress', JSON.stringify(state.progress));
          updateStreak();
        };

        const updateStreak = () => {
          const today = getTodayStr();
          if (state.streak.lastActive !== today) {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toISOString().split('T')[0];
            
            if (state.streak.lastActive === yesterdayStr) {
              state.streak.count++;
            } else {
              state.streak.count = 1;
            }
            state.streak.lastActive = today;
            localStorage.setItem('ege_plan_streak', JSON.stringify(state.streak));
          }
        };

        // --- 6. ГЕНЕРАЦИЯ HTML ИНТЕРФЕЙСА ---

        function getHeaderHTML() {
          return `
            <header class="bg-white border-b border-[#E8E4DF] shrink-0 print-hidden shadow-sm">
              <div class="max-w-5xl mx-auto px-4 md:px-6 h-16 flex items-center justify-between">
                <div class="flex items-center gap-4 md:gap-6">
                  <div class="flex items-center gap-2 cursor-pointer shrink-0" onclick="actions.setView('dashboard')">
                    <div class="bg-[#4A90D9] p-1.5 rounded-lg text-white">
                      <i class="ph ph-book-open text-xl"></i>
                    </div>
                    <h1 class="font-bold text-xl tracking-tight hidden sm:block">Plan Master</h1>
                  </div>
                  
                  <nav class="flex items-center gap-1 bg-[#FAF7F2] p-1 rounded-xl border border-[#E8E4DF]">
                    <button onclick="actions.setView('dashboard')" class="px-2 md:px-3 py-1.5 rounded-lg text-sm font-bold transition-colors flex items-center gap-1.5 ${state.view === 'dashboard' ? 'bg-white shadow-sm text-[#4A90D9]' : 'text-[#7A7570] hover:text-[#2D2A26]'}">
                      <i class="ph-fill ph-house text-xl md:text-lg"></i> <span class="hidden md:inline">Дашборд</span>
                    </button>
                    <button onclick="actions.setView('catalog')" class="px-2 md:px-3 py-1.5 rounded-lg text-sm font-bold transition-colors flex items-center gap-1.5 ${state.view === 'catalog' ? 'bg-white shadow-sm text-[#4A90D9]' : 'text-[#7A7570] hover:text-[#2D2A26]'}">
                      <i class="ph-fill ph-books text-xl md:text-lg"></i> <span class="hidden md:inline">Каталог</span>
                    </button>
                    <button onclick="actions.setView('statistics')" class="px-2 md:px-3 py-1.5 rounded-lg text-sm font-bold transition-colors flex items-center gap-1.5 ${state.view === 'statistics' ? 'bg-white shadow-sm text-[#4A90D9]' : 'text-[#7A7570] hover:text-[#2D2A26]'}">
                      <i class="ph-fill ph-chart-pie-slice text-xl md:text-lg"></i> <span class="hidden md:inline">Статистика</span>
                    </button>
                  </nav>
                </div>
                <div class="flex items-center gap-2 md:gap-4 text-sm font-medium shrink-0">
                  <div class="flex items-center gap-1 bg-[#FFF0E5] text-[#F5A623] px-2 md:px-3 py-1.5 rounded-lg font-bold" title="Серия дней">
                    <i class="ph-fill ph-fire text-lg ${state.streak.count > 0 ? 'text-[#F5A623]' : 'text-gray-300'}"></i> ${state.streak.count}
                  </div>
                </div>
              </div>
            </header>
          `;
        }

        window.generateBlockFilters = function() {
          return UNIQUE_BLOCKS.map(b => {
            const isActive = state.selectedBlock === b;
            const label = b === 'all' ? 'Все темы' : b.split('.')[0]; 
            const activeClasses = 'bg-[#4A90D9] text-white border-[#4A90D9] shadow-sm';
            const inactiveClasses = 'bg-white border-[#E8E4DF] text-[#7A7570] hover:border-[#4A90D9] hover:text-[#4A90D9]';
            return `<button onclick="actions.setBlock('${b}')" class="whitespace-nowrap px-4 py-2 rounded-full border text-sm font-bold transition-colors shrink-0 ${isActive ? activeClasses : inactiveClasses}">${label}</button>`;
          }).join('');
        };

        window.generateCatalogGrid = function() {
          const query = state.searchQuery.toLowerCase();
          const filtered = PLANS_DB.filter(plan => {
            if (state.selectedBlock !== 'all' && plan.section !== state.selectedBlock) return false;
            if (!query) return true;
            return plan.topic.toLowerCase().includes(query) || plan.aliases.some(a => a.toLowerCase().includes(query));
          });

          if (filtered.length === 0) {
             return `<div class="col-span-full text-center py-10 text-[#7A7570]">По вашему запросу ничего не найдено.</div>`;
          }

          return filtered.map(plan => {
            const p = state.progress[plan.id];
            let statusColor = 'bg-gray-200 text-[#7A7570]';
            let statusText = 'Новый';
            if (p) {
              if (p.status === 'mastered') { statusColor = 'bg-[#D4A017] text-white'; statusText = 'Выучен ⭐'; }
              else if (p.status === 'almost') { statusColor = 'bg-[#5CB85C] text-white'; statusText = 'Почти выучен'; }
              else { statusColor = 'bg-[#F5A623] text-white'; statusText = 'В процессе'; }
            }
            return `
              <div onclick="actions.openModal(${plan.id})" class="bg-white rounded-2xl border border-[#E8E4DF] p-4 md:p-5 hover:shadow-lg hover:border-[#4A90D9]/50 transition-all cursor-pointer group flex flex-col">
                <div class="flex justify-between items-start mb-3 gap-2">
                  <span class="text-[11px] md:text-xs font-bold uppercase tracking-wider text-[#4A90D9] bg-[#4A90D9]/10 px-2 py-1 rounded-md truncate">
                    ${plan.section ? plan.section.split('.')[0] : 'Раздел'}
                  </span>
                  <span class="text-[11px] md:text-xs font-bold px-2 py-1 rounded-md ${statusColor} shrink-0">${statusText}</span>
                </div>
                <h3 class="font-bold text-base md:text-lg mb-4 flex-grow group-hover:text-[#4A90D9] transition-colors leading-tight">${plan.topic}</h3>
                <div class="flex items-center justify-between text-[13px] md:text-sm text-[#7A7570] border-t border-[#E8E4DF] pt-3">
                  <span class="flex items-center gap-1"><i class="ph ph-clock"></i> ${p ? `${p.attempts} попыт. (max: ${p.bestScore})` : '0 попыток'}</span>
                  <span class="flex items-center gap-1 text-[#4A90D9] font-medium opacity-0 group-hover:opacity-100 transition-opacity hidden md:flex">Тренировать <i class="ph ph-caret-right"></i></span>
                </div>
              </div>
            `;
          }).join('');
        };

        function getViewHTML() {
          if (state.view === 'dashboard') {
            const today = getTodayStr();
            const reviews = PLANS_DB.filter(p => state.progress[p.id] && state.progress[p.id].nextReview <= today);
            
            let reviewCards = reviews.map(plan => `
              <div onclick="actions.openModal(${plan.id})" class="bg-white rounded-2xl border border-[#E8E4DF] p-4 hover:shadow-lg hover:border-[#4A90D9]/50 transition-all cursor-pointer group flex flex-col relative overflow-hidden">
                <div class="absolute top-0 left-0 w-1 h-full bg-[#E74C3C]"></div>
                <div class="flex justify-between items-start mb-2">
                  <span class="text-[11px] md:text-xs font-bold uppercase tracking-wider text-[#4A90D9] bg-[#4A90D9]/10 px-2 py-1 rounded-md">Повторение</span>
                </div>
                <h3 class="font-bold text-sm md:text-base mb-3 flex-grow group-hover:text-[#4A90D9] transition-colors leading-tight">${plan.topic}</h3>
                <div class="text-[12px] md:text-sm font-bold text-[#E74C3C] flex items-center gap-1"><i class="ph ph-warning-circle"></i> Пора повторить</div>
              </div>
            `).join('');

            if (reviews.length === 0) {
              reviewCards = `
                <div class="col-span-full bg-white rounded-2xl border border-[#E8E4DF] p-6 text-center text-[#7A7570] shadow-sm">
                  <i class="ph-fill ph-check-circle text-4xl mx-auto mb-2 text-[#5CB85C] opacity-50 block"></i>
                  <p class="font-bold text-sm md:text-base text-[#2D2A26]">На сегодня нет планов для повторения!</p>
                  <p class="mt-1 text-sm">Вы молодец. Можете взять новые темы из каталога.</p>
                </div>`;
            }

            return `
              <div class="flex flex-col h-full overflow-hidden">
                <div class="shrink-0 mb-4 md:mb-5">
                  <h2 class="text-2xl md:text-3xl font-bold mb-1">С возвращением! 👋</h2>
                  <p class="text-[#7A7570] text-sm md:text-base">Ваша статистика и планы на сегодня.</p>
                </div>
                
                <div class="shrink-0 grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 mb-5">
                  <div class="bg-white p-3 rounded-2xl border border-[#E8E4DF] shadow-sm flex flex-col items-center justify-center text-center">
                    <i class="ph-fill ph-chart-bar text-2xl md:text-3xl text-[#4A90D9] mb-1"></i>
                    <span class="text-2xl md:text-3xl font-black text-[#2D2A26] leading-none mb-1">${Object.keys(state.progress).length}</span>
                    <span class="text-[10px] md:text-[11px] font-bold text-[#7A7570] uppercase tracking-wider">Изучено</span>
                  </div>
                  <div class="bg-white p-3 rounded-2xl border border-[#E8E4DF] shadow-sm flex flex-col items-center justify-center text-center">
                    <i class="ph-fill ph-medal text-2xl md:text-3xl text-[#5CB85C] mb-1"></i>
                    <span class="text-2xl md:text-3xl font-black text-[#2D2A26] leading-none mb-1">${Object.values(state.progress).filter(p => p.status === 'mastered').length}</span>
                    <span class="text-[10px] md:text-[11px] font-bold text-[#7A7570] uppercase tracking-wider">Идеально</span>
                  </div>
                  <div class="bg-white p-3 rounded-2xl border border-[#E8E4DF] shadow-sm flex flex-col items-center justify-center text-center border-b-4 border-b-[#F5A623]">
                    <i class="ph-fill ph-fire text-2xl md:text-3xl text-[#F5A623] mb-1"></i>
                    <span class="text-2xl md:text-3xl font-black text-[#2D2A26] leading-none mb-1">${state.streak.count} дн.</span>
                    <span class="text-[10px] md:text-[11px] font-bold text-[#7A7570] uppercase tracking-wider">Ударный режим</span>
                  </div>
                  <button onclick="actions.startBlitz()" class="bg-gradient-to-br from-[#4A90D9] to-[#8E54E9] p-3 rounded-2xl text-white shadow-md hover:shadow-lg transition-all flex flex-col items-center justify-center group active:scale-95 border-b-4 border-b-[#7a42d4]">
                    <i class="ph-fill ph-lightning text-3xl md:text-4xl text-[#F5A623] mb-1 group-hover:scale-110 transition-transform"></i>
                    <span class="font-bold text-[12px] md:text-sm uppercase tracking-wide">Блиц-тест</span>
                  </button>
                </div>

                <div class="shrink-0 mb-3 flex items-center gap-2">
                  <i class="ph-fill ph-calendar-blank text-[#4A90D9] text-xl"></i> 
                  <h3 class="text-lg md:text-xl font-bold">План на сегодня</h3>
                </div>
                
                <div class="flex-grow overflow-y-auto pr-1 md:pr-2 pb-6">
                  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 md:gap-4">
                    ${reviewCards}
                  </div>
                </div>
              </div>
            `;
          }

          if (state.view === 'catalog') {
            return `
              <div class="flex flex-col h-full overflow-hidden">
                <div class="shrink-0 flex flex-col md:flex-row md:items-center justify-between gap-4 mb-4 md:mb-5">
                  <div>
                    <h2 class="text-2xl md:text-3xl font-bold mb-1 md:mb-2">Каталог планов</h2>
                    <p class="text-[#7A7570] text-sm md:text-base">Задание 24. Выберите тему для тренировки.</p>
                  </div>
                  <div class="relative w-full md:w-80 shrink-0">
                    <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-[#7A7570] text-lg"></i>
                    <input type="text" value="${state.searchQuery}" onkeyup="actions.setSearch(event.target.value)" placeholder="Поиск (темы, синонимы)..." class="w-full pl-10 pr-4 py-2 rounded-xl border border-[#E8E4DF] bg-white focus:outline-none focus:ring-2 focus:ring-[#4A90D9] transition-all text-sm md:text-base">
                  </div>
                </div>
                
                <div id="block-filters" class="shrink-0 flex overflow-x-auto gap-2 pb-2 mb-3 no-scrollbar">
                  ${window.generateBlockFilters()}
                </div>

                <div class="flex-grow overflow-y-auto pr-1 md:pr-2 pb-6">
                  <div id="catalog-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-5">
                    ${window.generateCatalogGrid()}
                  </div>
                </div>
              </div>
            `;
          }

          if (state.view === 'training' || state.view === 'blitz') {
            const plan = PLANS_DB.find(p => p.id === state.selectedPlanId);
            const isBlitz = state.view === 'blitz';
            return `
              <div class="h-full overflow-y-auto pr-1 md:pr-2 pb-6 flex flex-col">
                <div class="flex justify-between items-center mb-4 md:mb-5 shrink-0">
                  <button onclick="actions.setView('catalog')" class="flex items-center gap-2 text-[#7A7570] hover:text-[#2D2A26] font-medium transition-colors text-sm md:text-base">
                    <i class="ph ph-arrow-left text-lg"></i> ${isBlitz ? 'Сдаться' : 'В каталог'}
                  </button>
                  ${isBlitz ? `<div id="blitz-timer" class="text-2xl md:text-4xl font-black bg-white px-4 md:px-6 py-1 md:py-2 rounded-xl md:rounded-2xl border-2 shadow-sm text-[#4A90D9] border-[#E8E4DF]">00:${state.timeLeft.toString().padStart(2, '0')}</div>` : ''}
                </div>
                <div class="bg-white rounded-2xl md:rounded-3xl border border-[#E8E4DF] shadow-sm overflow-hidden flex flex-col flex-grow min-h-[500px]">
                  <div class="p-4 md:p-6 border-b border-[#E8E4DF] shrink-0 ${isBlitz ? 'bg-gradient-to-r from-[#4A90D9] to-[#8E54E9] text-white' : 'bg-gray-50/50'}">
                    <span class="text-[11px] md:text-sm font-bold uppercase tracking-wider ${isBlitz ? 'opacity-80' : 'text-[#4A90D9]'} mb-1 md:mb-2 block">${plan.section}</span>
                    <h2 class="text-xl md:text-2xl font-bold leading-tight">${plan.topic}</h2>
                  </div>
                  <div class="flex-grow p-4 md:p-6 flex flex-col">
                    ${!isBlitz ? `
                    <div class="mb-4 text-xs md:text-sm text-[#7A7570] bg-[#FAF7F2] p-3 md:p-4 rounded-xl border border-[#E8E4DF] shrink-0">
                      <p class="font-semibold mb-1 text-[#2D2A26]">Инструкция:</p>
                      <ul class="list-disc pl-4 space-y-1">
                        <li>Каждая новая строка — это новый пункт. Для подпункта добавьте пробел или тире в начале.</li>
                        <li>Минимум 3 пункта, детализированных в подпунктах.</li>
                      </ul>
                    </div>` : ''}
                    <textarea id="draft-area" oninput="actions.updateDraft(event.target.value)" placeholder="${isBlitz ? 'Быстро пишите...' : '1. Понятие...'}" class="flex-grow w-full resize-none p-3 md:p-4 font-mono text-[14px] md:text-[16px] leading-relaxed bg-[#FAF7F2] border border-[#E8E4DF] rounded-xl focus:outline-none focus:ring-2 focus:ring-[#8E54E9] focus:bg-white transition-all outline-none" spellcheck="false" autofocus>${state.userDraft}</textarea>
                  </div>
                  <div class="p-4 md:p-5 border-t border-[#E8E4DF] bg-gray-50/50 shrink-0 flex flex-col sm:flex-row justify-between items-center gap-3">
                    ${!isBlitz ? `<button onclick="actions.useHint()" class="text-[#7A7570] hover:text-[#2D2A26] font-medium text-xs md:text-sm px-4 py-2 w-full sm:w-auto text-center border border-[#E8E4DF] sm:border-transparent rounded-lg sm:rounded-none bg-white sm:bg-transparent">Нужна подсказка</button>` : '<div class="hidden sm:block"></div>'}
                    <button id="check-btn" onclick="actions.finishTraining(${isBlitz})" ${(!isBlitz && state.userDraft.trim().length < 10) ? 'disabled' : ''} class="w-full sm:w-auto ${isBlitz ? 'bg-[#2D2A26] hover:bg-black' : 'bg-[#4A90D9] hover:bg-[#3A7BC0] disabled:bg-gray-300 disabled:cursor-not-allowed'} text-white font-bold py-3 px-8 rounded-xl transition-colors shadow-sm flex items-center justify-center gap-2 text-sm md:text-base">
                      <i class="ph-fill ph-check-circle text-lg md:text-xl"></i> ${isBlitz ? 'Завершить' : 'Проверить план'}
                    </button>
                  </div>
                </div>
              </div>
            `;
          }

          if (state.view === 'training_blanks') {
            const plan = PLANS_DB.find(p => p.id === state.selectedPlanId);
            const blanksHTML = state.blanksData.map((item, idx) => `
              <div class="flex items-start gap-2 md:gap-3 ${item.type === 'subpoint' ? 'pl-6 md:pl-8' : ''}">
                <span class="text-[#4A90D9] font-bold mt-2 select-none shrink-0">${item.type === 'point' ? '•' : '◦'}</span>
                ${item.hidden 
                  ? `<input type="text" oninput="actions.updateBlank(${idx}, event.target.value)" value="${item.userInput}" placeholder="..." class="flex-grow bg-[#FAF7F2] border-b-2 border-dashed border-[#F5A623] text-[#2D2A26] px-2 py-1 md:px-3 md:py-2 focus:outline-none focus:bg-[#FFF0E5] focus:border-solid transition-colors font-medium text-base md:text-lg w-full">` 
                  : `<div class="px-2 py-1 md:px-3 md:py-2 text-[#2D2A26] font-medium text-base md:text-lg bg-gray-50 rounded-lg flex-grow border border-transparent shadow-sm">${item.text}</div>`
                }
              </div>
            `).join('');

            return `
              <div class="h-full overflow-y-auto pr-1 md:pr-2 pb-6 flex flex-col">
                <button onclick="actions.setView('catalog')" class="shrink-0 flex items-center gap-2 text-[#7A7570] hover:text-[#2D2A26] mb-4 md:mb-5 font-medium transition-colors text-sm md:text-base self-start">
                  <i class="ph ph-arrow-left text-lg"></i> Вернуться в каталог
                </button>
                <div class="bg-white rounded-2xl md:rounded-3xl border border-[#E8E4DF] shadow-sm overflow-hidden flex flex-col flex-grow">
                  <div class="shrink-0 p-4 md:p-6 border-b border-[#E8E4DF] bg-gray-50/50">
                    <span class="text-[11px] md:text-sm font-bold uppercase tracking-wider text-[#F5A623] mb-1 md:mb-2 flex items-center gap-1"><i class="ph-fill ph-puzzle-piece text-lg"></i> Заполни пробелы</span>
                    <h2 class="text-xl md:text-2xl font-bold leading-tight">${plan.topic}</h2>
                  </div>
                  <div class="flex-grow p-4 md:p-6">
                    <div class="mb-4 md:mb-6 text-xs md:text-sm text-[#7A7570] bg-[#FAF7F2] p-3 md:p-4 rounded-xl border border-[#E8E4DF]">
                       Впишите термины по смыслу. Оценки выставляются лояльно (синонимы работают).
                    </div>
                    <div class="space-y-3 md:space-y-4">${blanksHTML}</div>
                  </div>
                  <div class="shrink-0 p-4 md:p-5 border-t border-[#E8E4DF] bg-gray-50/50 flex justify-end">
                    <button onclick="actions.finishBlanks()" class="w-full sm:w-auto bg-[#F5A623] hover:bg-[#E09612] text-white font-bold py-3 px-8 rounded-xl transition-colors shadow-sm flex items-center justify-center gap-2 text-sm md:text-base">
                      <i class="ph-fill ph-check-circle text-lg md:text-xl"></i> Проверить
                    </button>
                  </div>
                </div>
              </div>
            `;
          }

          if (state.view === 'statistics') {
            const sectionsHTML = ['Человек в обществе. Духовная культура', 'Экономическая жизнь общества', 'Социальная сфера', 'Политическая сфера', 'Правовое регулирование'].map(section => {
              const sectionPlans = PLANS_DB.filter(p => p.section === section);
              if (sectionPlans.length === 0) return '';
              const learned = sectionPlans.filter(p => state.progress[p.id]?.status === 'mastered' || state.progress[p.id]?.status === 'almost').length;
              const percent = Math.round((learned / sectionPlans.length) * 100);
              return `
                <div class="mb-4">
                  <div class="flex justify-between text-xs md:text-sm font-bold mb-1">
                    <span class="text-[#7A7570] truncate pr-2">${section.split('.')[0]}</span>
                    <span class="text-[#4A90D9] shrink-0">${learned} / ${sectionPlans.length} (${percent}%)</span>
                  </div>
                  <div class="w-full bg-[#FAF7F2] rounded-full h-2 md:h-3 overflow-hidden border border-[#E8E4DF]">
                    <div class="bg-[#4A90D9] h-2 md:h-3 rounded-full transition-all duration-1000" style="width: ${percent}%"></div>
                  </div>
                </div>`;
            }).join('');

            const progressValues = Object.values(state.progress);
            const avgScore = progressValues.length > 0 ? Math.round(progressValues.reduce((acc, p) => acc + p.bestScore, 0) / progressValues.length) : 0;

            return `
              <div class="h-full overflow-y-auto pr-1 md:pr-2 pb-6">
                <h2 class="text-2xl md:text-3xl font-bold mb-4 md:mb-6">Подробная статистика</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 mb-8">
                   <div class="bg-white p-6 md:p-8 rounded-2xl md:rounded-3xl border border-[#E8E4DF] shadow-sm flex flex-col justify-center items-center text-center">
                      <div class="text-[#F5A623] mb-2 md:mb-4"><i class="ph-fill ph-medal text-5xl md:text-6xl"></i></div>
                      <h3 class="font-bold text-lg md:text-xl text-[#7A7570] mb-1 md:mb-2">Общий средний балл</h3>
                      <div class="text-5xl md:text-6xl font-black text-[#2D2A26]">${avgScore}</div>
                   </div>
                   <div class="bg-white p-6 md:p-8 rounded-2xl md:rounded-3xl border border-[#E8E4DF] shadow-sm">
                     <h3 class="font-bold text-lg md:text-xl mb-4 md:mb-6 text-[#2D2A26]">Изучение разделов</h3>
                     ${sectionsHTML}
                   </div>
                </div>
              </div>
            `;
          }

          if (state.view === 'comparison') {
            const plan = PLANS_DB.find(p => p.id === state.selectedPlanId);
            const res = state.comparisonResult;
            
            const referenceHTML = res.results.map((pm, idx) => `
              <div class="border-l-4 pl-3 md:pl-4 py-1" style="border-color: ${pm.matched ? '#5CB85C' : '#E74C3C'}">
                <div class="flex items-start gap-2 cursor-pointer hover:bg-gray-100 p-1 md:p-1.5 -ml-1 md:-ml-1.5 rounded-lg transition-colors select-none group" onclick="actions.toggleMatch(${idx})" title="Кликните, чтобы изменить оценку пункта">
                  ${pm.matched ? '<i class="ph-fill ph-check-circle text-[#5CB85C] mt-[3px] shrink-0 group-hover:scale-110 transition-transform text-base md:text-lg"></i>' : '<i class="ph-fill ph-x-circle text-[#E74C3C] mt-[3px] shrink-0 group-hover:scale-110 transition-transform text-base md:text-lg"></i>'}
                  <span class="font-bold text-[14px] md:text-base ${pm.matched ? 'text-[#2D2A26]' : 'text-[#7A7570]'}">${idx + 1}. ${pm.text}</span>
                </div>
                ${pm.subpoints.length > 0 ? `
                  <ul class="mt-1 md:mt-2 space-y-1">
                    ${pm.subpoints.map((sm, subIdx) => `
                      <li class="flex items-start gap-2 pl-5 md:pl-6 p-1 -ml-1 rounded-lg select-none ${res.ignoreSubpoints ? '' : 'cursor-pointer hover:bg-gray-100 transition-colors group'}" ${!res.ignoreSubpoints ? `onclick="actions.toggleMatch(${idx}, ${subIdx})"` : ''}>
                        ${res.ignoreSubpoints ? '<span class="text-[#7A7570] font-bold opacity-50 text-sm md:text-lg mt-[-2px]">•</span>' : (sm.matched ? '<span class="text-[#5CB85C] font-bold group-hover:scale-125 transition-transform inline-block text-[12px] md:text-base mt-[2px] md:mt-0">✓</span>' : '<span class="text-[#E74C3C] font-bold opacity-50 group-hover:scale-125 transition-transform inline-block text-[12px] md:text-base mt-[2px] md:mt-0">✗</span>')}
                        <span class="text-[13px] md:text-sm ${!res.ignoreSubpoints && sm.matched ? 'text-[#2D2A26]' : 'text-[#7A7570] opacity-80'}">${String.fromCharCode(1072 + subIdx)}) ${sm.text}</span>
                      </li>
                    `).join('')}
                  </ul>
                ` : ''}
                ${pm.subpoints.length > 0 && res.ignoreSubpoints ? `<div class="mt-2 text-[11px] md:text-xs text-[#4A90D9] italic pl-5 md:pl-6">* В блице подпункты показаны для справки</div>` : ''}
              </div>
            `).join('');

            return `
              <div id="comparison-report" class="h-full overflow-y-auto pr-1 md:pr-2 pb-6">
                 <div class="flex flex-col md:flex-row justify-between items-center mb-6 print-hidden gap-4">
                  <button onclick="actions.setView('catalog')" class="w-full md:w-auto flex items-center justify-center gap-2 text-[#7A7570] hover:text-[#2D2A26] font-medium transition-colors border border-[#E8E4DF] md:border-transparent py-2 md:py-0 rounded-lg md:rounded-none bg-white md:bg-transparent text-sm md:text-base">
                    <i class="ph ph-arrow-left text-lg"></i> Вернуться в каталог
                  </button>
                  ${res.isBlitz 
                    ? `<button onclick="actions.startBlitz()" class="w-full md:w-auto flex items-center justify-center gap-2 bg-[#8E54E9] hover:bg-[#7a42d4] text-white font-bold px-6 py-3 md:py-2 rounded-xl md:rounded-lg transition-colors shadow-sm animate-pulse text-sm md:text-base"><i class="ph-fill ph-lightning text-lg"></i> Следующий план Блица</button>` 
                    : `<button onclick="actions.printReport()" class="w-full md:w-auto flex items-center justify-center gap-2 text-[#4A90D9] bg-[#4A90D9]/10 hover:bg-[#4A90D9]/20 font-bold px-4 py-3 md:py-2 rounded-xl md:rounded-lg transition-colors text-sm md:text-base"><i class="ph ph-camera text-lg"></i> Сохранить для учителя</button>`}
                </div>

                <div class="bg-white rounded-2xl md:rounded-3xl border border-[#E8E4DF] p-6 md:p-8 mb-6 md:mb-8 text-center shadow-sm relative overflow-hidden">
                  <div class="md:absolute static md:top-4 md:right-4 bg-blue-50 text-[#4A90D9] text-[11px] md:text-xs font-bold px-3 py-2 rounded-lg flex items-center justify-center gap-1.5 animate-bounce print-hidden mb-4 md:mb-0">
                     <i class="ph-fill ph-cursor-click text-sm md:text-base"></i> Алгоритм ошибся? Кликайте на значки ✓ и ✗ ниже!
                  </div>
                  <h2 class="text-lg md:text-xl font-bold text-[#7A7570] mb-2">Ваш результат</h2>
                  <div class="text-5xl md:text-6xl font-black text-[#2D2A26] mb-3 md:mb-4 flex justify-center items-baseline gap-1">
                    <span class="${res.score >= 80 ? 'text-[#5CB85C]' : res.score >= 50 ? 'text-[#F5A623]' : 'text-[#E74C3C]'}">${res.score}</span>
                    <span class="text-2xl md:text-3xl text-[#7A7570]">/100</span>
                  </div>
                  <p class="text-base md:text-lg font-medium text-[#2D2A26] leading-tight mb-2">Тема: «${plan.topic}»</p>
                  <p class="text-xs md:text-sm text-[#7A7570] mt-2 max-w-xl mx-auto print-hidden">Система использует нечёткое сравнение (прощает синонимы и опечатки). Проверьте эталонный план ниже, чтобы закрепить материал.</p>
                </div>

                <div class="bg-white rounded-2xl md:rounded-3xl border border-[#E8E4DF] shadow-sm overflow-hidden">
                  <div class="grid grid-cols-1 lg:grid-cols-2 divide-y lg:divide-y-0 lg:divide-x divide-[#E8E4DF]">
                    <div class="p-4 md:p-8 bg-gray-50/30">
                      <h3 class="font-bold text-base md:text-lg mb-4 md:mb-6 flex items-center gap-2 text-[#7A7570]">Ваш ответ</h3>
                      <div class="font-mono text-[13px] md:text-[14px] leading-loose whitespace-pre-wrap text-[#2D2A26] break-words">${state.userDraft || "Пустой ответ"}</div>
                    </div>
                    <div class="p-4 md:p-8">
                      <h3 class="font-bold text-base md:text-lg mb-4 md:mb-6 flex items-center gap-2 text-[#5CB85C]">Эталонный план</h3>
                      <div class="space-y-4 md:space-y-6">${referenceHTML}</div>
                    </div>
                  </div>
                </div>
                
                <div class="mt-6 md:mt-8 flex justify-center pb-10 print-hidden">
                   <button onclick="actions.setView('catalog')" class="w-full md:w-auto bg-[#2D2A26] hover:bg-black text-white font-bold py-3 md:py-3 px-8 rounded-xl transition-colors shadow-md text-sm md:text-base">Вернуться и выбрать новый план</button>
                </div>
              </div>
            `;
          }
          return '';
        }

        function getModalHTML() {
          if (!state.modeSelectorId) return '';
          return `
            <div class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
              <div class="bg-white rounded-2xl md:rounded-3xl shadow-2xl max-w-2xl w-full overflow-hidden border border-[#E8E4DF]">
                <div class="p-4 md:p-6 border-b border-[#E8E4DF] flex justify-between items-center bg-gray-50/50">
                  <h3 class="text-lg md:text-xl font-bold">Выберите режим тренировки</h3>
                  <button onclick="actions.closeModal()" class="text-[#7A7570] hover:text-[#E74C3C] transition-colors p-1"><i class="ph ph-x text-xl md:text-2xl"></i></button>
                </div>
                <div class="p-4 md:p-8 grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4">
                  <button onclick="actions.startTraining(${state.modeSelectorId}, 'classic')" class="text-left p-4 md:p-6 rounded-xl md:rounded-2xl border-2 border-[#E8E4DF] hover:border-[#4A90D9] hover:bg-[#4A90D9]/5 transition-all group flex flex-col sm:block">
                    <div class="bg-[#4A90D9]/10 text-[#4A90D9] w-10 h-10 md:w-12 md:h-12 rounded-xl flex items-center justify-center mb-3 md:mb-4 group-hover:scale-110 transition-transform shrink-0">
                      <i class="ph-fill ph-pen-nib text-xl md:text-2xl"></i>
                    </div>
                    <div>
                      <h4 class="font-bold text-base md:text-lg mb-1 md:mb-2">Написать с нуля</h4>
                      <p class="text-xs md:text-sm text-[#7A7570] leading-tight">Классический Active Recall. Пустой лист, максимальная эффективность.</p>
                    </div>
                  </button>

                  <button onclick="actions.startTraining(${state.modeSelectorId}, 'blanks')" class="text-left p-4 md:p-6 rounded-xl md:rounded-2xl border-2 border-[#E8E4DF] hover:border-[#F5A623] hover:bg-[#F5A623]/5 transition-all group flex flex-col sm:block">
                    <div class="bg-[#F5A623]/10 text-[#F5A623] w-10 h-10 md:w-12 md:h-12 rounded-xl flex items-center justify-center mb-3 md:mb-4 group-hover:scale-110 transition-transform shrink-0">
                      <i class="ph-fill ph-puzzle-piece text-xl md:text-2xl"></i>
                    </div>
                    <div>
                      <h4 class="font-bold text-base md:text-lg mb-1 md:mb-2">Заполнить пробелы</h4>
                      <p class="text-xs md:text-sm text-[#7A7570] leading-tight">Часть пунктов скрыта. Отличный вариант для начального этапа.</p>
                    </div>
                  </button>
                </div>
              </div>
            </div>
          `;
        }

        // --- 7. ОТРИСОВКА (RENDER) ---
        function render() {
          const app = document.getElementById('app');
          app.innerHTML = `
            ${getHeaderHTML()}
            <main class="flex-grow overflow-hidden w-full max-w-5xl mx-auto px-4 md:px-6 pt-4 md:pt-6 pb-2 flex flex-col" id="main-content">
               ${getViewHTML()}
            </main>
            ${getModalHTML()}
          `;
        }

        // Инициализация при загрузке
        const initApp = () => {
          const today = getTodayStr();
          if (state.streak.lastActive !== today && state.streak.lastActive !== null) {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            if (state.streak.lastActive !== yesterday.toISOString().split('T')[0]) {
               state.streak.count = 0; 
            }
          }
          render();
        };

        initApp();

      } catch (err) {
        console.error(err);
        showErrorUI(err.message);
      }
    }

    bootstrap();

  </script>
</body>
</html>
